# Publish @shipeasy/cli to npm whenever cli/ changes on main.
# Gated on the full Admin-API contract suite (contract-tests.yml) passing first,
# plus the cli's own type-check + tests.
# Idempotent: publishes only when cli/package.json's version isn't on npm yet.
# Dependency order: cli depends on @shipeasy/openapi — we wait until the pinned
# range is resolvable on npm before publishing.
name: Publish cli
on:
  push:
    branches: [main]
    paths:
      - "cli/**"
  workflow_dispatch: {}
concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  # Gate: must pass before we publish (don't ship without a full contract pass).
  contract-tests:
    uses: ./.github/workflows/contract-tests.yml
    secrets: inherit

  publish:
    needs: contract-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    permissions:
      contents: read
      id-token: write # OIDC provenance + Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # Trusted Publishing needs npm >= 11.5.1
      - name: "Inline workspace deps → semver"
        run: node ../scripts/inline-workspace-deps.mjs
      - name: Wait for the @shipeasy/openapi dependency on npm (publish order)
        run: |
          RANGE=$(node -p "require('./package.json').dependencies['@shipeasy/openapi'] || ''")
          [ -z "$RANGE" ] && { echo "no @shipeasy/openapi dep — nothing to wait for"; exit 0; }
          for i in $(seq 1 30); do
            if npm view "@shipeasy/openapi@$RANGE" version >/dev/null 2>&1; then
              echo "@shipeasy/openapi@$RANGE resolvable on npm"; exit 0
            fi
            echo "waiting for @shipeasy/openapi@$RANGE on npm ($i/30)…"; sleep 10
          done
          echo "::error::@shipeasy/openapi@$RANGE never appeared on npm — publish openapi first" >&2
          exit 1
      - name: Install + build from the repo root workspace
        working-directory: .
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
      - name: cli pre-publish gate (type-check + tests)
        run: pnpm type-check && pnpm test
      - name: Strip _authToken (force OIDC)
        run: |
          for f in "$NPM_CONFIG_USERCONFIG" "$HOME/.npmrc"; do
            [ -f "$f" ] && sed -i.bak '/^\/\/registry\.npmjs\.org\/:_authToken=/d' "$f" || true
          done
      - name: Publish (OIDC, idempotent)
        run: |
          NAME=$(node -p "require('./package.json').name")
          V=$(node -p "require('./package.json').version")
          npm view "$NAME@$V" version >/dev/null 2>&1 \
            && echo "$NAME@$V already published — skipping" \
            || npm publish --access public --provenance
