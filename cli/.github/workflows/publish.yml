name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

# Lock to one publish at a time so a rapid double-tag can't race the npm
# version bump out of order.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing requires npm >= 11.5.1. Node 22 LTS ships
      # with npm 10.x by default, so upgrade explicitly. Without this the
      # publish step fails with ENEEDAUTH after we strip the placeholder
      # _authToken — npm 10 won't reach for OIDC even with id-token:write.
      - name: Upgrade npm to a Trusted-Publishing-aware release
        run: npm install -g npm@latest && npm --version

      # Source uses `workspace:^X.Y.Z` for cross-package refs so the monorepo
      # pnpm workspace links them locally. Outside the monorepo, those refs
      # don't resolve — rewrite to plain semver before install.
      - name: "Inline workspace: deps to registry semver"
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of ['dependencies','devDependencies','peerDependencies']) {
              if (!p[k]) continue;
              for (const dep of Object.keys(p[k])) {
                const v = p[k][dep];
                p[k][dep] = v
                  .replace(/^workspace:\\^/, '^')
                  .replace(/^workspace:~/, '~')
                  .replace(/^workspace:\\*$/, 'latest')
                  .replace(/^workspace:/, '');
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run build

      # Pre-publish gate: never ship a release that doesn't type-check or whose
      # tests (full command-tree coverage) fail. A red bar here aborts the job
      # before the npm publish step runs.
      - name: Type-check
        run: pnpm type-check

      - name: Test (all commands)
        run: pnpm test

      # Trusted Publishing: actions/setup-node always writes
      # `//registry.npmjs.org/:_authToken=XXXXX-…` into the per-job npmrc
      # (pointed at by $NPM_CONFIG_USERCONFIG), even when NODE_AUTH_TOKEN
      # is unset — it falls back to a literal placeholder. npm then sends
      # that placeholder as the bearer and gets 404. Trusted Publishing
      # never fires because npm sees an _authToken and doesn't reach for
      # the OIDC path. Strip the line so npm mints a short-lived OIDC
      # token from this workflow's `id-token: write` permission instead.
      - name: Strip _authToken from npmrc (force OIDC path)
        run: |
          set -e
          for f in "$NPM_CONFIG_USERCONFIG" "$HOME/.npmrc" "$GITHUB_WORKSPACE/.npmrc"; do
            [ -n "$f" ] && [ -f "$f" ] || continue
            sed -i.bak '/^\/\/registry\.npmjs\.org\/:_authToken=/d' "$f"
            echo "── stripped $f ──"
            cat "$f"
          done

      - name: Publish to npm (Trusted Publishing — OIDC)
        run: |
          NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$PKG_VERSION" version 2>/dev/null | grep -q "$PKG_VERSION"; then
            echo "Already published: $NAME@$PKG_VERSION"
          else
            npm publish --access public --provenance
          fi
