name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # This repo is published standalone, so cross-package refs use
      # `workspace:^X.Y.Z` that only resolve inside the monorepo. Rewrite them to
      # registry semver so a plain `pnpm install` works here (same step the
      # publish workflow runs).
      - name: "Inline workspace: deps to registry semver"
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of ['dependencies','devDependencies','peerDependencies']) {
              if (!p[k]) continue;
              for (const dep of Object.keys(p[k])) {
                const v = p[k][dep];
                p[k][dep] = v
                  .replace(/^workspace:\\^/, '^')
                  .replace(/^workspace:~/, '~')
                  .replace(/^workspace:\\*$/, 'latest')
                  .replace(/^workspace:/, '');
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - run: pnpm install --no-frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Test (all commands)
        run: pnpm test
