ProjectId:
  name: X-Project-Id
  in: header
  required: false
  description: Project the request operates on. Optional — defaults to the project the SDK key belongs to; pass it only to scope a multi-project key (the generated client sets it once from its configuration, so per-call callers never thread it).
  schema:
    type: string
PaginationLimit:
  name: limit
  in: query
  required: false
  description: Page size (1–500). Defaults to 100.
  schema:
    type: integer
    minimum: 1
    maximum: 500
    default: 100
PaginationCursor:
  name: cursor
  in: query
  required: false
  description: Opaque cursor returned in the previous page's `next_cursor`. Omit for the first page.
  schema:
    type: string
Q:
  name: q
  in: query
  required: false
  description: Case-insensitive substring filter across the resource's human-readable text columns (e.g. `name`, `title`, `description`). OR-matched across those columns; omit to return everything.
  schema:
    type: string
    maxLength: 100
