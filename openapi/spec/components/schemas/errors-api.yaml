ErrorRecord:
  type: object
  description: |-
    A tracked production error — one row per distinct issue, keyed by `fingerprint`. Rows are never created by hand: an ingestion path (worker log drain / the `see()` SDK reporter) folds each occurrence into the matching row, bumping `count` and `lastSeenAt`. The admin surface only lists them, reads one, and flips `status`.

    Field names are camelCase (the D1 row projected through Drizzle). Many columns are nullable because the reporting source may not supply them.
  properties:
    id:
      type: string
      description: Stable opaque error id.
    projectId:
      type: string
      description: Project this issue belongs to.
    fingerprint:
      type: string
      description: Stable dedupe key (hash of `errorType` + normalized `message` + consequence). Unique per project — every occurrence with the same fingerprint folds into this one row.
    causedByFingerprint:
      description: Fingerprint of the issue this one descends from — set when `see()` reported the same error (re-throw) or its `{ cause }` (wrap) at an inner boundary first. Points at another error's `fingerprint` in the same project (soft reference, no FK). `null` for a root issue.
      anyOf:
        - type: string
        - type: "null"
    message:
      type: string
      description: Error message text.
    errorType:
      description: Error class/name, e.g. `TypeError`. `null` when the source didn't supply one.
      anyOf:
        - type: string
        - type: "null"
    stack:
      description: Stack trace of the latest occurrence, or `null` if none was captured.
      anyOf:
        - type: string
        - type: "null"
    source:
      description: Where it surfaced — Worker name (`shipeasy`, `shipeasy-worker`) or `sdk-client` / `sdk-server`. `null` if unknown.
      anyOf:
        - type: string
        - type: "null"
    url:
      description: Latest occurrence's raw URL (with ids intact), or `null`.
      anyOf:
        - type: string
        - type: "null"
    seenUrls:
      description: 'Distinct, id-normalized route templates this issue has surfaced on, as a JSON-encoded string array (e.g. `["https://app/dashboard/#/gates"]`). UUIDs / numeric ids / opaque tokens are collapsed to `#` so the same route under different ids counts once. `null` if none recorded.'
      anyOf:
        - type: string
        - type: "null"
    subject:
      description: Consequence subject — `<errorType> causes the <subject> to <outcome>`. `null` if no consequence was reported.
      anyOf:
        - type: string
        - type: "null"
    outcome:
      description: Consequence outcome — see `subject`. `null` if no consequence was reported.
      anyOf:
        - type: string
        - type: "null"
    side:
      description: Which SDK side reported it — `client` or `server`. `null` if unknown.
      anyOf:
        - type: string
        - type: "null"
    env:
      description: Published env the reporting SDK ran against (e.g. `dev`, `staging`, `prod`). `null` if unknown.
      anyOf:
        - type: string
        - type: "null"
    kind:
      description: "`see()` error kind. `null` when the source didn't classify the occurrence."
      anyOf:
        - type: string
          enum:
            - caught
            - uncaught
            - unhandled_rejection
            - network
            - violation
        - type: "null"
    lastExtrasJson:
      description: Latest occurrence's sanitized extras, JSON-encoded. `null` if none.
      anyOf:
        - type: string
        - type: "null"
    sdkVersion:
      description: "`@shipeasy/sdk` version of the latest occurrence, or `null`."
      anyOf:
        - type: string
        - type: "null"
    count:
      type: integer
      minimum: 1
      description: Number of folded occurrences for this fingerprint.
    status:
      type: string
      enum:
        - open
        - resolved
        - ignored
      description: "Triage state. `open` is the default; a `resolved` error reopens automatically (ingestion-side) if it recurs; `ignored` is sticky until flipped back here."
    firstSeenAt:
      type: string
      description: ISO-8601 timestamp of the first folded occurrence.
    lastSeenAt:
      type: string
      description: ISO-8601 timestamp of the most recent folded occurrence. Rows are ordered by this, descending.
    createdAt:
      type: string
      description: ISO-8601 timestamp the row was created.
    updatedAt:
      type: string
      description: ISO-8601 timestamp of the last mutation (e.g. a status flip).
  required:
    - id
    - projectId
    - fingerprint
    - message
    - count
    - status
    - firstSeenAt
    - lastSeenAt
    - createdAt
    - updatedAt
  additionalProperties: false
ListErrorsResponse:
  type: array
  description: A bare JSON array of tracked errors, ordered by `lastSeenAt` descending. There is no pagination envelope — `limit` caps the page size.
  items:
    $ref: "#/ErrorRecord"
UpdateErrorStatusRequest:
  type: object
  description: Body for `PATCH /api/admin/errors/{id}`. The only mutable field is `status` (open ⇄ resolved ⇄ ignored).
  properties:
    status:
      type: string
      enum:
        - open
        - resolved
        - ignored
      description: New triage state. `resolved` reopens automatically on recurrence; `ignored` is sticky.
  required:
    - status
  additionalProperties: false
FileErrorTicketResponse:
  type: object
  description: |-
    The feedback ticket that tracks this error. Idempotent — if an open `error` ticket already tracks this fingerprint (hand- or auto-filed), the existing one is returned instead of creating a duplicate.
  properties:
    id:
      type: string
      description: Feedback ticket id.
    number:
      type: integer
      description: Human-facing per-project ticket number.
  required:
    - id
    - number
  additionalProperties: false
ErrorSeriesRequest:
  type: object
  description: |-
    Time window for the occurrence series. Bounds are epoch **seconds** (Analytics Engine stores the occurrence timestamp in seconds). `to` must be strictly greater than `from`.
  properties:
    from:
      type: integer
      minimum: 0
      description: Window start, epoch seconds (inclusive).
    to:
      type: integer
      minimum: 0
      description: Window end, epoch seconds (exclusive). Must be greater than `from`.
    bucket:
      type: integer
      minimum: 60
      maximum: 86400
      default: 3600
      description: Bucket width in seconds (60s–86400s/1d). Defaults to `3600` (hourly). Each returned point is floor-aligned to this width.
  required:
    - from
    - to
  additionalProperties: false
ErrorSeriesResponse:
  type: object
  description: Bucketed occurrence counts for one tracked error (by its fingerprint), plus the Analytics Engine SQL that produced them.
  properties:
    sql:
      type: string
      description: The Analytics Engine SQL executed to produce `rows` (echoed for transparency / debugging).
    rows:
      type: array
      description: Bucketed occurrence series, ordered by `t` ascending.
      items:
        type: object
        properties:
          t:
            type: integer
            description: Bucket start, epoch seconds, floor-aligned to `bucket`.
          v:
            type: number
            description: Occurrence count in the bucket (sample-interval weighted).
        required:
          - t
          - v
        additionalProperties: true
  required:
    - sql
    - rows
  additionalProperties: false
