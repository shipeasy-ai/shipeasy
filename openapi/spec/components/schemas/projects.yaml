GetCurrentProjectResponse:
  type: object
  properties:
    id:
      type: string
      description: Stable opaque project id.
    name:
      type: string
      description: Project name.
    domain:
      anyOf:
        - type: string
        - type: "null"
      description: Project domain, or `null` if unset.
    ownerEmail:
      type: string
      description: Email of the account that owns the project.
    plan:
      type: string
      enum:
        - free
        - pro
        - business
        - enterprise
      description: Billing plan tier.
    status:
      type: string
      enum:
        - active
        - inactive
      description: Project lifecycle status.
    subscriptionStatus:
      type: string
      description: Stripe subscription status (`none`, `active`, `trialing`, `past_due`, …).
    billingInterval:
      type: string
      enum:
        - monthly
        - annual
      description: Billing cadence.
    currentPeriodEnd:
      anyOf:
        - type: string
        - type: "null"
      description: ISO-8601 end of the current billing period, or `null`.
    trialEndsAt:
      anyOf:
        - type: string
        - type: "null"
      description: ISO-8601 trial end, or `null` if not trialing.
    cancelAtPeriodEnd:
      type: number
      description: "`1` if the subscription is set to cancel at period end, else `0`."
    moduleTranslations:
      anyOf:
        - type: boolean
        - type: number
      description: Whether the i18n/translations module is enabled.
    moduleConfigs:
      anyOf:
        - type: boolean
        - type: number
      description: Whether the dynamic-configs module is enabled.
    moduleGates:
      anyOf:
        - type: boolean
        - type: number
      description: Whether the feature-gates module is enabled.
    moduleExperiments:
      anyOf:
        - type: boolean
        - type: number
      description: Whether the experiments module is enabled.
    moduleFeedback:
      anyOf:
        - type: boolean
        - type: number
      description: Whether the feedback/ops module is enabled.
    minSampleSize:
      type: integer
      description: Verdict power guard — minimum users per arm before a ship/hold verdict.
    minRuntimeDays:
      type: integer
      description: Minimum days an experiment must run before a verdict (peeking guard).
    defaultPower:
      type: number
      description: Target statistical power (1−β) feeding the realized-MDE calculation.
    ciConfidence:
      type: number
      description: Confidence level for the interval surfaced on results.
    defaultAllocationPct:
      type: integer
      description: Default traffic allocation (basis points) new experiments start with.
    defaultHoldout:
      type: integer
      description: Default holdout carve-out (basis points) that seeds each new universe's holdout.
    defaultWinsorizePct:
      type: integer
      description: Default winsorization percentile new metrics start with.
    defaultMei:
      anyOf:
        - type: number
        - type: "null"
      description: Default minimum effect of interest (relative, 0–1) new metrics start with, or null.
    cupedBaselineDays:
      type: integer
      description: CUPED baseline window — days of pre-experiment history, frozen at start.
    cupedMinOverlap:
      type: number
      description: CUPED selection-bias guard — min share of users with a baseline, else skip.
    cupedMinBaselineUsers:
      type: integer
      description: CUPED — minimum users with a baseline before it runs at all.
    msprtTauMeiFactor:
      type: number
      description: mSPRT prior width — τ = minimum effect of interest × this factor.
    msprtTauSdFactor:
      type: number
      description: mSPRT fallback prior width — τ = this × control SD when no MEI is set.
    srmThreshold:
      type: number
      description: SRM chi-square p-value below which the run is called invalid.
    createdAt:
      type: string
      description: ISO-8601 timestamp of project creation.
    updatedAt:
      type: string
      description: ISO-8601 timestamp of last update.
  required:
    - id
    - name
    - domain
    - ownerEmail
    - plan
    - status
    - subscriptionStatus
    - billingInterval
    - currentPeriodEnd
    - trialEndsAt
    - cancelAtPeriodEnd
    - moduleTranslations
    - moduleConfigs
    - moduleGates
    - moduleExperiments
    - moduleFeedback
    - createdAt
    - updatedAt
  additionalProperties: {}
  description: The project the caller's auth header resolves to. The shape is open — additional project fields may be present.
UpsertProjectRequest:
  type: object
  properties:
    domain:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: '^(\*|(\*\.)?[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+)$'
      description: 'Lowercase bare hostname (e.g. `acme.com`, `app.acme.com`, `*.acme.com`), or `*` to allow any origin. Full URLs with `https://` are not accepted. The project is keyed by `(owner_email, domain)`, so a second call with the same domain returns the existing project.'
    name:
      description: Human-readable project name. Defaults to the domain on first create.
      type: string
      minLength: 1
      maxLength: 100
  required:
    - domain
  additionalProperties: false
  description: Body for `POST /api/admin/projects/upsert`. Only `domain` is required; the owner is resolved from the caller's session.
UpsertProjectResponse:
  type: object
  properties:
    id:
      type: string
      description: Stable opaque project id.
    name:
      type: string
      description: Project name (the supplied `name`, or the domain on first create).
    domain:
      anyOf:
        - type: string
        - type: "null"
      description: Project domain, or `null` if unset.
    owner_email:
      type: string
      description: Email of the account that owns the project.
    created:
      type: boolean
      description: "`true` if this call created the project, `false` if it returned an existing one."
  required:
    - id
    - name
    - domain
    - owner_email
    - created
  additionalProperties: false
  description: Result of `POST /api/admin/projects/upsert`.
UpdateProjectRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 120
      description: New project name.
    domain:
      $ref: "#/UpsertProjectRequest/properties/domain"
    slug:
      type: string
      minLength: 2
      maxLength: 48
      pattern: ^[a-z0-9](?:[a-z0-9-]{0,46}[a-z0-9])?$
      description: URL-safe identifier used in app URLs and SDK config. Lowercase letters, numbers, and hyphens; 2–48 chars; cannot start or end with a hyphen. The caller lowercases the raw slug before sending.
    defaultEnv:
      type: string
      enum:
        - dev
        - staging
        - prod
      description: Default environment new resources are scoped to.
    timezone:
      type: string
      minLength: 1
      maxLength: 64
      description: IANA timezone the project's daily analysis runs in.
    statMethod:
      type: string
      enum:
        - sequential
        - fixed
        - bayesian
      description: Statistical method the experiment analyzer uses.
    sigThreshold:
      type: string
      enum:
        - "0.01"
        - "0.05"
        - "0.10"
      description: Significance threshold (alpha) for experiment analysis.
    autoRollback:
      type: boolean
      description: Whether a failing guardrail auto-rolls back the experiment.
    minSampleDays:
      type: integer
      minimum: 1
      maximum: 365
      description: Minimum number of days an experiment must run before it can be called.
    moduleTranslations:
      type: boolean
      description: Enable/disable the i18n/translations module.
    moduleConfigs:
      type: boolean
      description: Enable/disable the dynamic-configs module.
    moduleGates:
      type: boolean
      description: Enable/disable the feature-gates module.
    moduleExperiments:
      type: boolean
      description: Enable/disable the experiments module.
    moduleFeedback:
      type: boolean
      description: Enable/disable the feedback/ops module.
    moduleUser:
      type: boolean
      description: Enable/disable the user-management module.
    moduleEvents:
      type: boolean
      description: Enable/disable the events module.
    minSampleSize:
      type: integer
      minimum: 2
      maximum: 1000000
      description: Verdict power guard — minimum users per arm before a ship/hold verdict.
    minRuntimeDays:
      type: integer
      minimum: 0
      maximum: 365
      description: Minimum days an experiment must run before a verdict (peeking guard).
    defaultPower:
      type: number
      minimum: 0.5
      maximum: 0.99
      description: Target statistical power (1−β) feeding the realized-MDE calculation.
    ciConfidence:
      type: number
      minimum: 0.5
      maximum: 0.999
      description: Confidence level for the interval surfaced on results (any value in [0.5, 0.999], e.g. 0.90, 0.95, 0.975, 0.99).
    defaultAllocationPct:
      type: integer
      minimum: 1
      maximum: 10000
      description: Default traffic allocation (basis points, 1000 = 10%) new experiments start with; overridable per experiment.
    defaultHoldout:
      type: integer
      minimum: 0
      maximum: 10000
      description: Default holdout carve-out (basis points) that seeds each new universe's holdout (0 = none).
    defaultWinsorizePct:
      type: integer
      minimum: 1
      maximum: 99
      description: Default winsorization percentile new metrics start with; overridable per metric.
    defaultMei:
      anyOf:
        - type: number
          minimum: 0
          maximum: 1
        - type: "null"
      description: Default minimum effect of interest (relative, 0–1) new metrics start with; overridable per metric and per experiment. Null clears it.
    cupedBaselineDays:
      type: integer
      minimum: 1
      maximum: 365
      description: CUPED baseline window — days of pre-experiment history, frozen at start.
    cupedMinOverlap:
      type: number
      minimum: 0.01
      maximum: 0.99
      description: CUPED selection-bias guard — min share of users with a baseline, else skip.
    cupedMinBaselineUsers:
      type: integer
      minimum: 10
      maximum: 100000
      description: CUPED — minimum users with a baseline before it runs at all.
    msprtTauMeiFactor:
      type: number
      minimum: 0.1
      maximum: 2
      description: mSPRT prior width — τ = minimum effect of interest × this factor.
    msprtTauSdFactor:
      type: number
      minimum: 0.05
      maximum: 1
      description: mSPRT fallback prior width — τ = this × control SD when no MEI is set.
    srmThreshold:
      type: number
      minimum: 0.0001
      maximum: 0.05
      description: SRM chi-square p-value below which the run is called invalid.
  additionalProperties: false
  description: "Body for `PATCH /api/admin/projects/{id}`. Partial — every field is optional; only supplied fields change. The project id in the path must match the caller's own project."
