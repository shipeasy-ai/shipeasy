CreateMetricRequest:
  type: object
  properties:
    name:
      $ref: ./common.yaml#/MetricName
    folder:
      $ref: ./common.yaml#/Folder
    event_name:
      type: string
      minLength: 1
      description: Source event the query reads from.
    query:
      description: Metric query DSL string, e.g. `sum(purchase, amount)`. Provide this OR `query_ir`.
      type: string
      minLength: 1
      maxLength: 4096
    query_ir:
      description: Typed query IR — the structured alternative to `query`. Provide this OR `query`.
      type: object
      properties:
        agg:
          oneOf:
            - type: object
              properties:
                kind:
                  type: string
                  const: count_users
              required:
                - kind
              additionalProperties: false
            - type: object
              properties:
                kind:
                  type: string
                  const: count_events
              required:
