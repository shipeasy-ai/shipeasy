      default: 99
      description: Winsorise percentile (1–99) to clamp outliers. Defaults to 99.
      type: integer
      minimum: 1
      maximum: 99
    min_detectable_effect:
      default: null
      description: Minimum detectable effect (relative, 0–1) for power planning. `null` to omit.
      anyOf:
        - type: number
        - type: "null"
    direction:
      default: higher_better
      type: string
      enum:
        - higher_better
        - lower_better
        - neutral
      description: Desired direction of movement. `higher_better` (default), `lower_better`, or `neutral` (guardrail).
  required:
    - name
    - event_name
  additionalProperties: false
  description: Body for `POST /api/admin/metrics`. Requires `name`, `event_name`, and exactly one of `query` / `query_ir`.
CreateMetricResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned metric id.
    name:
      type: string
      description: Metric name that was created.
  required:
    - id
    - name
  additionalProperties: false
  description: Result of a successful metric create.
DeleteMetricResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
  required:
    - ok
  additionalProperties: false
  description: Soft-delete (archive) acknowledgement.
