                        type: object
                        properties:
                          label:
                            type: string
                            pattern: ^[a-z_][a-z0-9_]{0,63}$
                            description: Event property / label identifier.
                          op:
                            type: string
                            enum:
                              - =
                              - "!="
                              - =~
                              - "!~"
                            description: Match operator (`=~`/`!~` are regex).
                          value:
                            type: string
                            maxLength: 512
                            description: Quoted filter value (coerced for numeric labels).
                        required:
                          - label
                          - op
                          - value
                        additionalProperties: false
                        description: One label filter on the source event.
                  required:
                    - agg
                    - metric
                  additionalProperties: false
                  description: Numerator or denominator arm of a `ratio` aggregation.
                denominator:
                  type: object
                  properties:
                    agg:
                      type: string
                      enum:
                        - count_users
                        - count_events
                      description: Counting mode for this ratio arm.
                    metric:
                      type: string
                      minLength: 1
                      maxLength: 128
                      description: Source event name for this ratio arm.
                    filters:
                      description: Optional label filters.
                      maxItems: 16
                      type: array
                      items:
                        type: object
                        properties:
                          label:
                            type: string
                            pattern: ^[a-z_][a-z0-9_]{0,63}$
                            description: Event property / label identifier.
                          op:
                            type: string
                            enum:
                              - =
                              - "!="
                              - =~
                              - "!~"
                            description: Match operator (`=~`/`!~` are regex).
                          value:
                            type: string
                            maxLength: 512
                            description: Quoted filter value (coerced for numeric labels).
                        required:
                          - label
                          - op
                          - value
                        additionalProperties: false
                        description: One label filter on the source event.
                  required:
