                  type: string
                  const: retention_Nd
                n:
                  type: integer
                  minimum: 1
                  maximum: 90
                  description: Retention window in days (1–90).
              required:
                - kind
                - n
              additionalProperties: false
            - type: object
              properties:
                kind:
                  type: string
                  const: ratio
                numerator:
                  type: object
                  properties:
                    agg:
                      type: string
                      enum:
                        - count_users
                        - count_events
                      description: Counting mode for this ratio arm.
                    metric:
