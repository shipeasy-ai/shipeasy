                p:
                  anyOf:
                    - type: number
                      const: 0.5
                    - type: number
                      const: 0.75
                    - type: number
                      const: 0.9
                    - type: number
                      const: 0.95
                    - type: number
                      const: 0.99
                    - type: number
                      const: 0.999
                  description: Quantile fraction (0.5 = p50 … 0.999 = p999).
              required:
                - kind
                - p
              additionalProperties: false
            - type: object
              properties:
