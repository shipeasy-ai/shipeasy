CreateConfigRequest:
  type: object
  properties:
    name:
      $ref: ./common.yaml#/ConfigName
    description:
      description: Optional free-form description shown in the dashboard. Max 512 chars.
      type: string
      maxLength: 512
    folder:
      $ref: ./common.yaml#/Folder
    schema:
      type: object
      additionalProperties: {}
      description: JSON Schema (draft 2020-12) describing the shape of the config value. Top-level `type` must be `'object'`; every published value is validated against this schema.
    value:
      type: object
      additionalProperties: {}
      description: "Initial config value. Either a single JSON object applied to every env, or a `{ env: value }` map seeding per-env values. Must match `schema`. Defaults to `{}` on every env when omitted."
  required:
    - name
    - schema
  additionalProperties: false
  description: Body for `POST /api/admin/configs`. `name` + `schema` required.
CreateConfigResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned config id.
    name:
      type: string
      maxLength: 128
      description: Stable config key in `folder.name` form (two lowercase segments separated by a dot, e.g. `pricing.tiers`). Used by SDKs as `Shipeasy.getConfig('<name>')`. Immutable after create.
  required:
    - id
    - name
  additionalProperties: false
UpdateConfigRequest:
  type: object
  properties:
    schema:
      description: Replacement schema. When supplied, the new schema is validated against every published value before it lands.
      type: object
      additionalProperties: {}
    value:
      type: object
      additionalProperties: {}
      description: Flat value applied to **every** env. Publishes a new version per env. To target one env, use `PUT /{id}/drafts` then `POST /{id}/publish`.
    folder:
      $ref: ./common.yaml#/Folder
  additionalProperties: false
  description: Body for `PATCH /api/admin/configs/{id}`. Partial — only supplied fields change. `value` republishes on every env.
UpdateConfigResponse:
  type: object
  properties:
    id:
      type: string
      description: Config id that was updated.
  required:
    - id
  additionalProperties: false
UpdateConfigSchemaRequest:
  type: object
  properties:
    schema:
      description: Replacement JSON Schema (draft 2020-12). Validated against every published value before it lands.
      type: object
      additionalProperties: {}
  required:
    - schema
  additionalProperties: false
  description: Body for `PATCH /api/admin/configs/{id}/schema`. Schema-only update — replaces the config's schema and re-validates existing values.
UpdateConfigSchemaResponse:
  type: object
  properties:
    id:
      type: string
      description: Config id whose schema was updated.
  required:
    - id
  additionalProperties: false
DeleteConfigResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
  required:
    - ok
  additionalProperties: false
SaveConfigDraftRequest:
  type: object
  properties:
    env:
      $ref: ./common.yaml#/Env
    value:
      type: object
      additionalProperties: {}
      description: Draft value to stage on `env`. Validated against the config's current schema.
  required:
    - env
    - value
  additionalProperties: false
  description: Body for `PUT /api/admin/configs/{id}/drafts`. Stages a value for a single env without publishing.
SaveConfigDraftResponse:
  type: object
  properties:
    id:
      type: string
    env:
      $ref: ./common.yaml#/Env
    baseVersion:
      type: integer
      minimum: -9007199254740991
      maximum: 9007199254740991
      description: Published version the draft is based on.
    updatedAt:
      type: string
  required:
    - id
    - env
    - baseVersion
    - updatedAt
  additionalProperties: false
DiscardConfigDraftRequest:
  type: object
  properties:
    env:
      $ref: ./common.yaml#/Env
  required:
    - env
  additionalProperties: false
  description: Body for `POST /api/admin/configs/{id}/publish` and `DELETE /api/admin/configs/{id}/drafts`. Names the target env.
DiscardConfigDraftResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
  required:
    - ok
  additionalProperties: false
PublishConfigDraftRequest:
  type: object
  properties:
    env:
      $ref: ./common.yaml#/Env
  required:
    - env
  additionalProperties: false
  description: Body for `POST /api/admin/configs/{id}/publish` and `DELETE /api/admin/configs/{id}/drafts`. Names the target env.
PublishConfigDraftResponse:
  type: object
  properties:
    id:
      type: string
    env:
      $ref: ./common.yaml#/Env
    version:
      type: integer
      minimum: -9007199254740991
      maximum: 9007199254740991
      description: Newly published version on `env`.
  required:
    - id
    - env
    - version
  additionalProperties: false
ListConfigActivityResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: string
      action:
        type: string
        description: Audit action (e.g. `config.create`, `config.publish`).
      actorEmail:
        type: string
      actorType:
        type: string
        enum:
          - user
          - cli
          - system
      payload: {}
      createdAt:
        type: string
        description: ISO-8601 timestamp.
    required:
      - id
      - action
      - actorEmail
      - actorType
      - payload
      - createdAt
    additionalProperties: false
  description: Recent audit rows for one config, newest first.
ListConfigVersionsResponse:
  type: array
  items:
    type: object
    properties:
      version:
        type: integer
        minimum: 1
        maximum: 9007199254740991
        description: Published version number on the requested env (monotonically increasing per env).
      value:
        description: The full JSON value that was published at this version.
      publishedAt:
        type: string
        description: ISO-8601 publish timestamp.
      publishedBy:
        type: string
        description: Email/id of the actor who published this version.
    required:
      - version
      - value
      - publishedAt
      - publishedBy
    additionalProperties: false
    description: One published version of the config's value on the requested env.
  description: Full published-value history for one (config, env), newest first. The config's schema is config-level and not versioned — this is value history only.
