ListConfigsResponse:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: Stable opaque config id (`cfg_…`).
          name:
            type: string
            maxLength: 128
            description: Stable config key in `folder.name` form (two lowercase segments separated by a dot, e.g. `pricing.tiers`). Used by SDKs as `Shipeasy.getConfig('<name>')`. Immutable after create.
          description:
            anyOf:
              - type: string
              - type: "null"
          folder:
            description: Folder segment used for dashboard organisation, or `null` when the config lives at the root.
            anyOf:
              - type: string
              - type: "null"
          schema:
            type: object
            additionalProperties: {}
            description: JSON Schema (draft 2020-12) describing the shape of the config value. Top-level `type` must be `'object'`; every published value is validated against this schema.
          creatorEmail:
            description: Resolved email of the creator (`created_by` → `users.email`), or `null` when unknown. List-only enrichment — present on `GET /api/admin/configs` rows, absent from the by-id detail — so it is optional, never required.
            anyOf:
              - type: string
              - type: "null"
          createdAt:
            description: ISO-8601 creation timestamp, or `null` on legacy rows. List-only enrichment — present on `GET /api/admin/configs` rows, absent from the by-id detail — so it is optional, never required.
            anyOf:
              - type: string
              - type: "null"
          updatedAt:
            type: string
            description: ISO-8601 timestamp of last mutation.
          envs:
            type: object
            additionalProperties:
              type: object
              properties:
                version:
                  type: integer
                  minimum: -9007199254740991
                  maximum: 9007199254740991
                  description: Monotonically increasing version per env.
                publishedAt:
                  type: string
                  description: ISO-8601 publish timestamp.
                publishedBy:
                  type: string
                  description: Email/id of the actor who published this version.
              required:
                - version
                - publishedAt
                - publishedBy
              additionalProperties: false
            description: Per-env latest published version metadata.
          drafts:
            type: object
            additionalProperties:
              type: object
              properties:
                updatedAt:
                  type: string
                  description: ISO-8601 last-edit timestamp on the draft.
                authorEmail:
                  type: string
                  description: Email/id of the actor who last edited the draft.
                baseVersion:
                  type: integer
                  minimum: -9007199254740991
                  maximum: 9007199254740991
                  description: Published version the draft was forked from.
              required:
                - updatedAt
                - authorEmail
                - baseVersion
              additionalProperties: false
            description: Per-env active drafts (if any).
          values:
            description: Per-env latest published values (only returned by `GET /{id}`, not list).
            type: object
            additionalProperties: {}
          draftValues:
            description: Per-env draft values (only returned by `GET /{id}`).
            type: object
            additionalProperties: {}
        required:
          - id
          - name
          - description
          - folder
          - schema
          - updatedAt
          - envs
          - drafts
        additionalProperties: false
    next_cursor:
      anyOf:
        - type: string
        - type: "null"
  required:
    - data
    - next_cursor
  additionalProperties: false
