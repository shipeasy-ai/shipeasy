ListEventsResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: string
        description: Stable opaque event id.
      name:
        type: string
        description: Event name — the handle metric queries reference.
      folder:
        anyOf:
          - description: "Optional folder name used to group items in the dashboard. Part of the SDK lookup key: an item in folder `checkout` named `new-cart` is referenced as `checkout/new-cart` from the SDK."
            anyOf:
              - type: string
                maxLength: 256
                pattern: ^[a-zA-Z0-9_-]+$
              - type: "null"
          - type: "null"
        description: Folder the event is filed under, or `null` if at the root.
      description:
        anyOf:
          - type: string
          - type: "null"
        description: Human-readable description, or `null` if none set.
      properties:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 64
              description: Property key, e.g. `amount` or `plan`.
            type:
              type: string
              enum:
                - string
                - number
                - boolean
              description: Value type of the property as recorded on the event.
            required:
              default: false
              description: Whether the property must be present on every emitted event.
              type: boolean
            description:
              default: ""
              description: Human-readable description of the property.
              type: string
          required:
            - name
            - type
            - required
            - description
          additionalProperties: false
          description: One typed property declared on a catalogued event.
        description: Typed properties declared on the event.
      pending:
        type: integer
        minimum: -9007199254740991
        maximum: 9007199254740991
        description: "`1` if this is an auto-discovered name awaiting approval (metrics on it fail until approved), `0` if approved/usable."
      createdAt:
        type: string
        description: ISO-8601 timestamp of creation.
    required:
      - id
      - name
      - description
      - properties
      - pending
      - createdAt
    additionalProperties: false
    description: A catalogued event.
  description: Every catalogued event in the project (including pending auto-discovered names).
