CreateEventRequest:
  type: object
  properties:
    name:
      type: string
      pattern: ^[a-zA-Z0-9_][a-zA-Z0-9_\-.]{0,127}$
      description: Event name. Starts with a letter, digit, or `_`; letters, digits, `_`, `-`, `.`; max 128 chars. Immutable after create — this is the handle metric queries reference.
    folder:
      description: "Optional folder name used to group items in the dashboard. Part of the SDK lookup key: an item in folder `checkout` named `new-cart` is referenced as `checkout/new-cart` from the SDK."
      anyOf:
        - type: string
          maxLength: 256
          pattern: ^[a-zA-Z0-9_-]+$
        - type: "null"
    description:
      description: Optional human-readable description of the event.
      type: string
    properties:
      default: []
      description: Typed properties declared on the event. Defaults to an empty list.
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 64
            description: Property key, e.g. `amount` or `plan`.
          type:
            type: string
            enum:
              - string
              - number
              - boolean
            description: Value type of the property as recorded on the event.
          required:
            default: false
            description: Whether the property must be present on every emitted event.
            type: boolean
          description:
            default: ""
            description: Human-readable description of the property.
            type: string
        required:
          - name
          - type
          - required
          - description
        additionalProperties: false
        description: One typed property declared on a catalogued event.
  required:
    - name
    - properties
  additionalProperties: false
  description: Body for `POST /api/admin/events`. Only `name` is required.
CreateEventResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned event id.
    name:
      type: string
      description: The event name that was registered.
  required:
    - id
    - name
  additionalProperties: false
  description: Result of creating (or approving an existing pending) event.
UpdateEventRequest:
  type: object
  properties:
    folder:
      description: "Optional folder name used to group items in the dashboard. Part of the SDK lookup key: an item in folder `checkout` named `new-cart` is referenced as `checkout/new-cart` from the SDK."
      anyOf:
        - type: string
          maxLength: 256
          pattern: ^[a-zA-Z0-9_-]+$
        - type: "null"
    description:
      description: New description for the event.
      type: string
    properties:
      description: Replaces the full property set (no merge). Omit to leave properties unchanged.
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 64
            description: Property key, e.g. `amount` or `plan`.
          type:
            type: string
            enum:
              - string
              - number
              - boolean
            description: Value type of the property as recorded on the event.
          required:
            default: false
            description: Whether the property must be present on every emitted event.
            type: boolean
          description:
            default: ""
            description: Human-readable description of the property.
            type: string
        required:
          - name
          - type
          - required
          - description
        additionalProperties: false
        description: One typed property declared on a catalogued event.
  additionalProperties: false
  description: Body for `PATCH /api/admin/events/{id}` and `POST /api/admin/events/{id}/approve`. All fields optional; `name` is immutable after create.
UpdateEventResponse:
  type: object
  properties:
    id:
      type: string
      description: Event id that was updated.
  required:
    - id
  additionalProperties: false
  description: Result of updating or approving an event.
