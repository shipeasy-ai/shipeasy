CreateExperimentRequest:
  type: object
  properties:
    name:
      type: string
      maxLength: 128
      pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
      description: Stable experiment key. Single segment or `folder.name` (a-z, 0-9, `_`/`-`; max 128 chars). Used by SDKs as `Shipeasy.getExperiment(user, '<name>')`. Immutable after create.
    description:
      default: null
      description: Free-form description. Max 2000 chars, markdown rendered in the dashboard.
      anyOf:
        - type: string
          maxLength: 2000
        - type: "null"
    hypothesis:
      default: null
      description: Hypothesis statement shown in the editor. Display-only.
      anyOf:
        - type: string
          maxLength: 4000
        - type: "null"
    tag:
      default: null
      description: Short tag chip rendered next to the name. Display-only.
      anyOf:
        - type: string
          maxLength: 64
        - type: "null"
    owner_email:
      default: null
      description: Owner email. Display-only.
      anyOf:
        - type: string
          maxLength: 254
        - type: "null"
    audience:
      default: null
      description: Audience label shown in the editor. Display-only.
      anyOf:
        - type: string
          maxLength: 256
        - type: "null"
    bucket_by:
      default: null
      anyOf:
        - type: string
          minLength: 1
          maxLength: 128
          pattern: ^[a-zA-Z_][a-zA-Z0-9_]*$
          description: User-attribute name used as the bucketing key — e.g. `user_id` (default), `session_id`, `device_id`, or a custom attribute like `company_id` to keep a whole org on one variant. Defaults to `user_id` when omitted.
        - type: "null"
    folder:
      description: "Optional folder name used to group items in the dashboard. Part of the SDK lookup key: an item in folder `checkout` named `new-cart` is referenced as `checkout/new-cart` from the SDK."
      anyOf:
        - type: string
          maxLength: 256
          pattern: ^[a-zA-Z0-9_-]+$
        - type: "null"
    universe:
      type: string
      minLength: 1
      description: Name of an existing universe in the project. Returns `422` if the universe doesn't exist.
    targeting_gate:
      default: null
      description: Optional gate name. Only callers that pass the gate are enrolled in the experiment.
      anyOf:
        - type: string
        - type: "null"
    allocation_pct:
      default: 0
      description: Share of the (gated) audience allocated to the experiment, in basis points (0–10000 = 0%–100%). `0` = unallocated. Use `allocation_percent` (0–100) below to think in percent. Immutable while the experiment is running.
      type: integer
      minimum: 0
      maximum: 10000
    allocation_percent:
      description: Allocation as a **percentage** (0–100, fractional ok). Friendlier alias for `allocation_pct`; converted to basis points server-side (e.g. `50` = 5000 bp). If both are set, `allocation_percent` wins.
      type: number
      minimum: 0
      maximum: 100
    salt:
      description: Hash salt for bucketing. Auto-generated if omitted. Immutable while running.
      type: string
      minLength: 1
      maxLength: 64
    params:
      default: {}
      type: object
      additionalProperties:
        type: string
        enum:
          - string
          - bool
          - number
      description: "Map of param-name → scalar type. Defines the shape of `groups[].params`. Example: `{ headline: 'string', show_cta: 'bool' }`."
    groups:
      minItems: 2
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 64
            description: Group label (e.g. `control`, `treatment_a`). Max 64 chars.
          weight:
            type: integer
            minimum: 0
            maximum: 10000
            description: Allocation weight in basis points (0–10000). The sum across all groups must equal exactly **10000** (100%).
          params:
            default: {}
            description: Per-group parameter values delivered to the SDK when a caller is hashed into this group. Keys must match the experiment's `params` schema.
            type: object
            additionalProperties: {}
        required:
          - name
          - weight
          - params
        additionalProperties: false
        description: One variant in the experiment. Weights across all groups must sum to 10000.
      description: Two or more variants. Weights must sum to exactly 10000 (100%). Immutable while running.
    significance_threshold:
      default: 0.05
      description: p-value cutoff used by the analysis pass. Defaults to `0.05`. Values other than 0.05 require Pro plan or higher.
      type: number
      minimum: 0.0001
      maximum: 0.5
    min_runtime_days:
      default: 0
      description: Minimum days the experiment must run before results are considered conclusive.
      type: integer
      minimum: 0
      maximum: 365
    min_sample_size:
      default: 100
      description: Minimum exposures per group before results are considered conclusive.
      type: integer
      minimum: 1
      maximum: 9007199254740991
    sequential_testing:
      default: false
      description: Enable sequential testing (always-valid p-values). Requires Premium plan or higher.
      type: boolean
    goal_metric:
      description: Single goal metric defined inline — either a DSL `query` or an `event` (+`aggregation`/`value`) the server compiles. Attaching one is required before the experiment can be started. The underlying event is auto-created if missing.
      type: object
      properties:
        name:
          type: string
          maxLength: 128
          pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
        query:
          description: Metric DSL string, e.g. `count_users(checkout_completed)`. Provide this OR `event`.
          type: string
          minLength: 1
          maxLength: 4096
        event:
          description: Event name to build the metric from server-side (friendlier alternative to `query`). Auto-created if missing.
          type: string
          minLength: 1
          maxLength: 256
        aggregation:
          description: Reducer for the `event` form. Defaults to `count_users`.
          type: string
          enum:
            - count_users
            - count_events
            - retention_7d
            - retention_30d
            - sum
            - avg
        value:
          description: Numeric event property for `sum`/`avg` aggregations (with `event`).
          type: string
          minLength: 1
          maxLength: 256
      additionalProperties: false
    guardrail_metrics:
      default: []
      description: Up to 10 guardrail metrics defined inline. Each is upserted (event + metric) and attached with role=guardrail.
      maxItems: 10
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            maxLength: 128
            pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
          query:
            description: Metric DSL string, e.g. `count_users(checkout_completed)`. Provide this OR `event`.
            type: string
            minLength: 1
            maxLength: 4096
          event:
            description: Event name to build the metric from server-side (friendlier alternative to `query`). Auto-created if missing.
            type: string
            minLength: 1
            maxLength: 256
          aggregation:
            description: Reducer for the `event` form. Defaults to `count_users`.
            type: string
            enum:
              - count_users
              - count_events
              - retention_7d
              - retention_30d
              - sum
              - avg
          value:
            description: Numeric event property for `sum`/`avg` aggregations (with `event`).
            type: string
            minLength: 1
            maxLength: 256
        additionalProperties: false
        description: "Inline metric: either a DSL `query`, or an `event` (+ `aggregation`/`value`) the server compiles into one."
  required:
    - name
    - description
    - hypothesis
    - tag
    - owner_email
    - audience
    - bucket_by
    - universe
    - targeting_gate
    - allocation_pct
    - params
    - groups
    - significance_threshold
    - min_runtime_days
    - min_sample_size
    - sequential_testing
    - guardrail_metrics
  additionalProperties: false
  description: Body for `POST /api/admin/experiments`. `name`, `universe`, and `groups` (≥2, weights sum to 10000) required.
