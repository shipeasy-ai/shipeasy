ListExperimentsResponse:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: ./experiment-api-row.yaml#/ExperimentApiRow
    next_cursor:
      anyOf:
        - type: string
        - type: "null"
  required:
    - data
    - next_cursor
  additionalProperties: false
GetExperimentResponse:
  $ref: ./experiment-api-row.yaml#/ExperimentApiRow
CreateExperimentRequest:
  type: object
  properties:
    name:
      type: string
      maxLength: 128
      pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
      description: Stable experiment key. Single segment or `folder.name` (a-z, 0-9, `_`/`-`; max 128 chars). Used by SDKs as `Shipeasy.getExperiment(user, '<name>')`. Immutable after create.
    description:
      default: null
      description: Free-form description. Max 2000 chars, markdown rendered in the dashboard.
      anyOf:
        - type: string
          maxLength: 2000
        - type: "null"
    hypothesis:
      default: null
      description: Hypothesis statement shown in the editor. Display-only.
      anyOf:
        - type: string
          maxLength: 4000
        - type: "null"
    tag:
      default: null
      description: Short tag chip rendered next to the name. Display-only.
      anyOf:
        - type: string
          maxLength: 64
        - type: "null"
    owner_email:
      default: null
      description: Owner email. Display-only.
      anyOf:
        - type: string
          maxLength: 254
        - type: "null"
    audience:
      default: null
      description: Audience label shown in the editor. Display-only.
      anyOf:
        - type: string
          maxLength: 256
        - type: "null"
    bucket_by:
      default: null
      anyOf:
        - type: string
          minLength: 1
          maxLength: 128
          pattern: ^[a-zA-Z_][a-zA-Z0-9_]*$
          description: User-attribute name used as the bucketing key — e.g. `user_id` (default), `session_id`, `device_id`, or a custom attribute like `company_id` to keep a whole org on one variant. Defaults to `user_id` when omitted.
        - type: "null"
    folder:
      $ref: ./common.yaml#/Folder
    universe:
      type: string
      minLength: 1
      description: Name of an existing universe in the project. Returns `422` if the universe doesn't exist.
    targeting_gate:
      default: null
      description: Optional gate name (a `targeting`-type flag). Only callers that pass the gate are enrolled in the experiment.
      anyOf:
        - type: string
        - type: "null"
    holdout_gate:
      default: null
      description: Optional per-experiment holdout gate — the name of a `holdout`-type flag (public % + whitelist). A caller the flag passes is *held out* (never assigned, sees the universe defaults). Distinct from the universe-level holdout.
      anyOf:
        - type: string
        - type: "null"
    allocation_pct:
      default: 0
      description: Share of the (gated) audience allocated to the experiment, in basis points (0–10000 = 0%–100%). `0` = unallocated. Under pooled assignment this is the size of the universe-pool slice claimed. Use `allocation_percent` (0–100) below to think in percent. Immutable while the experiment is running.
      type: integer
      minimum: 0
      maximum: 10000
    allocation_percent:
      description: Allocation as a **percentage** (0–100, fractional ok). Friendlier alias for `allocation_pct`; converted to basis points server-side (e.g. `50` = 5000 bp). If both are set, `allocation_percent` wins.
      type: number
      minimum: 0
      maximum: 100
    reserved_headroom:
      description: Basis points of this experiment's split kept empty (0–10000) so a new variant can be appended into it while running without reshuffling. Group weights must sum to `10000 − reserved_headroom`. Defaults to the universe's `recommended_headroom` when omitted.
      type: integer
      minimum: 0
      maximum: 10000
    salt:
      description: Hash salt for bucketing. Auto-generated if omitted. Immutable while running.
      type: string
      minLength: 1
      maxLength: 64
    params:
      default: {}
      type: object
      additionalProperties:
        type: string
        enum:
          - string
          - bool
          - number
      description: "**Deprecated** — the universe now owns the config schema (`param_schema`). Retained for back-compat; new experiments should leave this empty and declare params on the universe. Map of param-name → scalar type."
    groups:
      minItems: 2
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 64
            description: Group label (e.g. `control`, `treatment_a`). Max 64 chars.
          weight:
            type: integer
            minimum: 0
            maximum: 10000
            description: Allocation weight in basis points (0–10000). Weights across all groups must sum to `10000 − reserved_headroom` (100% minus any reserved tail).
          params:
            default: {}
            description: Per-variant **override map** — a subset of the universe's `param_schema` keys. A key the variant doesn't set inherits the universe default. Unknown keys (not in the universe schema) are rejected.
            type: object
            additionalProperties: {}
        required:
          - name
          - weight
        additionalProperties: false
        description: One variant. Its `params` may only override keys declared on the universe schema.
      description: Two or more variants. Weights must sum to `10000 − reserved_headroom`. Existing weights are immutable while running, but a new variant may be appended into the reserved tail.
    significance_threshold:
      default: 0.05
      description: p-value cutoff used by the analysis pass. Defaults to `0.05`. Values other than 0.05 require Pro plan or higher.
      type: number
      minimum: 0.0001
      maximum: 0.5
    min_runtime_days:
      default: 0
      description: Minimum days the experiment must run before results are considered conclusive.
      type: integer
      minimum: 0
      maximum: 365
    min_sample_size:
      default: 100
      description: Minimum exposures per group before results are considered conclusive.
      type: integer
      minimum: 1
      maximum: 9007199254740991
    sequential_testing:
      default: false
      description: Enable sequential testing (always-valid p-values). Requires Premium plan or higher.
      type: boolean
    goal_metric:
      description: Single goal metric defined inline — either a DSL `query` or an `event` (+`aggregation`/`value`) the server compiles. Attaching one is required before the experiment can be started. The underlying event is auto-created if missing.
      $ref: ./common.yaml#/ExperimentInlineMetric
    guardrail_metrics:
      default: []
      description: Up to 10 guardrail metrics defined inline. Each is upserted (event + metric) and attached with role=guardrail.
      maxItems: 10
      type: array
      items:
        $ref: ./common.yaml#/ExperimentInlineMetric
  required:
    - name
    - universe
    - groups
  additionalProperties: false
  description: Body for `POST /api/admin/experiments`. `name`, `universe`, and `groups` (≥2, weights sum to 10000) required.
