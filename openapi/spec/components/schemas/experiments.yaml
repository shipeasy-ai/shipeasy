GetExperimentResultsResponse:
  type: object
  properties:
    experiment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 128
          pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
