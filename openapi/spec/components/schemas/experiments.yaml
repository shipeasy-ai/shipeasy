ListExperimentsResponse:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: Stable opaque experiment id (`exp_…`).
          name:
            type: string
            maxLength: 128
            pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
            description: Stable experiment key. Single segment or `folder.name` (a-z, 0-9, `_`/`-`; max 128 chars). Used by SDKs as `Shipeasy.getExperiment(user, '<name>')`. Immutable after create.
          description:
            anyOf:
              - type: string
              - type: "null"
          hypothesis:
            anyOf:
              - type: string
              - type: "null"
          tag:
            anyOf:
              - type: string
              - type: "null"
          ownerEmail:
            anyOf:
              - type: string
              - type: "null"
          audience:
            anyOf:
              - type: string
              - type: "null"
          bucketBy:
            anyOf:
              - type: string
                minLength: 1
                maxLength: 128
                pattern: ^[a-zA-Z_][a-zA-Z0-9_]*$
                description: User-attribute name used as the bucketing key — e.g. `user_id` (default), `session_id`, `device_id`, or a custom attribute like `company_id` to keep a whole org on one variant. Defaults to `user_id` when omitted.
              - type: "null"
          folder:
            anyOf:
              - type: string
              - type: "null"
          status:
            type: string
            enum:
              - draft
              - running
              - stopped
              - archived
          universe:
            type: string
            description: Universe name this experiment draws from.
          targetingGate:
            anyOf:
              - type: string
              - type: "null"
          allocationPct:
            type: integer
            minimum: -9007199254740991
            maximum: 9007199254740991
            description: Allocation in basis points (0–10000).
          salt:
            type: string
          params:
            type: object
            additionalProperties:
              type: string
              enum:
                - string
                - bool
                - number
          groups:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 64
                  description: Group label (e.g. `control`, `treatment_a`). Max 64 chars.
                weight:
                  type: integer
                  minimum: 0
                  maximum: 10000
                  description: Allocation weight in basis points (0–10000). The sum across all groups must equal exactly **10000** (100%).
                params:
                  default: {}
                  description: Per-group parameter values delivered to the SDK when a caller is hashed into this group. Keys must match the experiment's `params` schema.
                  type: object
                  additionalProperties: {}
              required:
                - name
                - weight
                - params
              additionalProperties: false
              description: One variant in the experiment. Weights across all groups must sum to 10000.
          significanceThreshold:
            type: number
          minRuntimeDays:
            type: integer
            minimum: -9007199254740991
            maximum: 9007199254740991
          minSampleSize:
            type: integer
            minimum: -9007199254740991
            maximum: 9007199254740991
          sequentialTesting:
            type: boolean
          startedAt:
            anyOf:
              - type: string
              - type: "null"
            description: ISO-8601 timestamp the experiment last transitioned to `running`, or `null`.
          stoppedAt:
            anyOf:
              - type: string
              - type: "null"
          updatedAt:
            type: string
        required:
          - id
          - name
          - description
          - hypothesis
          - tag
          - ownerEmail
          - audience
          - bucketBy
          - folder
          - status
          - universe
          - targetingGate
          - allocationPct
          - salt
          - params
          - groups
          - significanceThreshold
          - minRuntimeDays
          - minSampleSize
          - sequentialTesting
          - startedAt
          - updatedAt
        additionalProperties: false
    next_cursor:
      anyOf:
        - type: string
        - type: "null"
  required:
    - data
    - next_cursor
  additionalProperties: false
