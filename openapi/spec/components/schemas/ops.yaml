  description: One in-app notification as the bell feed renders it.
ListNotificationFeedResponse:
  type: object
  properties:
    notifications:
      type: array
      items:
        $ref: "#/NotificationFeedItem"
      description: The feed, newest first (max 30). Project-wide broadcasts plus notifications addressed to the caller; events muted for the in-app channel are omitted.
    unread:
      type: integer
      description: Count of the caller's unread (visible, unmuted) notifications.
