  additionalProperties: false
  description: "Body for `POST /api/admin/ops/{handle}/investigation`. `kind` is required; include at least one content field (`summary`/`findings`/`question`/`qaNotes`) — the panel renders whatever it gets."
NotificationFeedItem:
  type: object
  properties:
    id:
      type: string
      description: Notification id (pass to the mark-read `POST` to mark just this one).
    event:
      type: string
      description: The notification's event key (e.g. `ops.attention`, `feedback.completed`, `comment.mention`).
    title:
      type: string
      description: One-line headline.
    body:
      type: string
      description: "Notification body. For `ops.attention` escalations: line 1 = summary, following lines = numbered unblock steps."
    href:
      anyOf:
        - type: string
        - type: "null"
      description: Dashboard-relative deep link to the related item, or `null`.
    createdAt:
      type: string
      description: ISO-8601 creation timestamp.
    read:
      type: boolean
      description: Whether the notification has been marked read.
  required:
    - id
    - event
    - title
    - body
    - href
    - createdAt
    - read
