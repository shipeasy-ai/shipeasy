ListOpsInvestigationsResponse:
  type: array
  items:
    $ref: "#/OpsInvestigation"
  description: Response for `GET /api/admin/ops/{handle}/investigation` — the item's `published` investigation records, newest first (max 50).
CreateOpsInvestigationRequest:
  type: object
  properties:
    kind:
      type: string
      enum:
        - investigated
        - detected
        - question
        - ready_for_qa
        - working
        - note
