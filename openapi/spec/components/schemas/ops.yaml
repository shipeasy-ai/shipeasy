    - prNumber
    - prUrl
    - sources
    - confidence
    - tokensUsed
    - durationMs
    - visibility
    - startedAt
    - completedAt
    - sessionId
    - ackedBy
    - completedAction
    - createdAt
    - updatedAt
  additionalProperties: false
