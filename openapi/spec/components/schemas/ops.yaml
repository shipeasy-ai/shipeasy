    summary:
      type: string
      maxLength: 2000
      description: One-line summary of the record.
    findings:
      type: string
      maxLength: 50000
      description: The full findings write-up (markdown).
    question:
      type: string
      maxLength: 10000
      description: A blocking question for the team (markdown).
    qaNotes:
      type: string
      maxLength: 50000
      description: How to verify the fix — QA notes (markdown).
    agent:
      type: string
      enum:
        - jarvis
        - claude
        - cursor
        - copilot
        - jules
      description: The agent type producing the record — pass your own type when you are a coding agent.
    model:
      type: string
      maxLength: 200
      description: The model the agent ran on.
    connectorId:
      type: string
      maxLength: 200
      description: The trigger-connector row id the agent ran through.
    prNumber:
      type: integer
      description: A PR the record references.
    prUrl:
      type: string
      format: uri
      maxLength: 2000
      description: HTML URL of that PR.
    sources:
      type: array
      maxItems: 200
      items:
        type: object
        properties:
          path:
            type: string
            description: Repo-relative file path inspected.
          url:
            type: string
            description: External link consulted.
          label:
            type: string
            description: Human-readable label for the source.
        additionalProperties: false
        description: One file/link inspected while producing the record.
      description: The files/links inspected.
    confidence:
      type: string
      enum:
        - low
        - medium
        - high
      description: Self-reported confidence in the record.
    tokensUsed:
      type: integer
      description: Tokens the run consumed.
    durationMs:
      type: integer
      description: Run duration in milliseconds.
    visibility:
      type: string
      enum:
        - draft
        - published
      description: Record visibility. Defaults to `published`; `draft` keeps it out of the panel.
    startedAt:
      type: string
      description: ISO-8601 timestamp the work started.
    completedAt:
      type: string
      description: ISO-8601 timestamp the work finished.
    sessionId:
      type: string
      maxLength: 300
      description: The agent-run session id, so the dashboard can deep-link to the run.
  required:
