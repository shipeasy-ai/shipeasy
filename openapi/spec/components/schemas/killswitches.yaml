ListKillswitchesResponse:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: Stable opaque killswitch id.
          name:
            type: string
            maxLength: 128
            description: Stable config key in `folder.name` form (two lowercase segments separated by a dot, e.g. `pricing.tiers`). Used by SDKs as `Shipeasy.getConfig('<name>')`. Immutable after create.
          description:
            anyOf:
              - type: string
              - type: "null"
            description: Free-form description or `null`.
          folder:
            description: Folder segment used for dashboard organisation, or `null` when the killswitch lives at the root.
            anyOf:
              - type: string
              - type: "null"
          creatorEmail:
            description: Resolved email of the creator (`created_by` → `users.email`), or `null` when unknown.
            anyOf:
              - type: string
              - type: "null"
          createdAt:
            description: ISO-8601 creation timestamp, or `null` on legacy rows created before the column existed.
            anyOf:
              - type: string
              - type: "null"
          updatedAt:
            type: string
            description: ISO-8601 timestamp of last mutation.
          envs:
            type: object
            additionalProperties:
              type: object
              properties:
                value:
                  type: boolean
                  description: Flat boolean published for this env.
                switches:
                  type: object
                  additionalProperties:
                    type: boolean
                version:
                  type: integer
                  minimum: -9007199254740991
                  maximum: 9007199254740991
                  description: Monotonically increasing version per env.
                publishedAt:
                  type: string
                  description: ISO-8601 publish timestamp for this version.
                publishedBy:
                  anyOf:
                    - type: string
                    - type: "null"
                  description: Email/id of the actor who published this version.
              required:
                - value
                - version
                - publishedAt
              additionalProperties: false
            description: Per-env latest value, switches, version, and publish timestamp.
        required:
          - id
          - name
          - description
          - folder
          - creatorEmail
          - createdAt
          - updatedAt
          - envs
        additionalProperties: false
    next_cursor:
      anyOf:
        - type: string
        - type: "null"
  required:
    - data
    - next_cursor
  additionalProperties: false
GetKillswitchResponse:
