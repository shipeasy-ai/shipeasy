ListI18nProfilesResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: string
        description: Stable opaque profile id.
      name:
        type: string
        description: Profile handle, e.g. `en:prod` or `fr:prod`.
      isDefault:
        description: "`1` for the project's single default profile (always seeded as `en:prod`), else `0`."
        type: number
      createdAt:
        description: ISO-8601 timestamp of creation.
        type: string
      deletedAt:
        description: ISO-8601 soft-delete timestamp, or `null` if live.
        anyOf:
          - type: string
          - type: "null"
    required:
      - id
      - name
      - isDefault
      - createdAt
      - deletedAt
    additionalProperties: false
    description: One i18n locale profile.
DeleteI18nProfileResponse:
  $ref: "./common.yaml#/OkResponse"
CreateI18nProfileRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[a-z0-9][a-z0-9_:.-]*$
      description: Profile handle to create, e.g. `en:prod` or `fr:prod`. Lowercase alphanumeric start, then letters/digits/`_`/`:`/`.`/`-`; max 64 chars. The locale is encoded in the handle, so no separate locale fields are accepted.
  required:
    - name
  additionalProperties: false
  description: Body for `POST /api/admin/i18n/profiles`. Only `name` is accepted.
CreateI18nProfileResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned profile id.
    name:
      type: string
      description: Profile handle that was created.
  required:
    - id
    - name
  additionalProperties: false
  description: Created profile id + name.
ListI18nKeysResponse:
  type: object
  properties:
    keys:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: Stable opaque key id.
          key:
            type: string
            description: Dotted key path, e.g. `home.cta`.
          value:
            type: string
            description: Current translated value for the key.
          description:
            description: Optional human note stored with the key.
            anyOf:
              - type: string
              - type: "null"
          variables:
            description: "`{{var}}` placeholder names in the value, or `null` when there are none."
            anyOf:
              - type: array
                items:
                  type: string
              - type: "null"
          profileId:
            description: Owning profile id.
            type: string
          profileName:
            description: Name of the owning profile (e.g. `en:prod`), or `null` when it cannot be resolved.
            anyOf:
              - type: string
              - type: "null"
          chunkId:
            description: Owning chunk (authoring grouping) id.
            type: string
          chunkName:
            description: Name of the owning chunk (authoring grouping), or `null` when it cannot be resolved.
            anyOf:
              - type: string
              - type: "null"
          updatedAt:
            description: ISO-8601 timestamp of the last edit.
            type: string
          updatedBy:
            description: Actor email that last edited the key.
            type: string
        required:
          - id
          - key
          - value
          - description
          - variables
          - profileId
          - profileName
          - chunkId
          - chunkName
          - updatedAt
          - updatedBy
        additionalProperties: false
        description: One i18n key row.
      description: The page of matching keys.
    total:
      type: number
      description: Total matching keys across all pages (ignores `limit`/`offset`).
  required:
    - keys
    - total
  additionalProperties: false
  description: A page of i18n keys plus the total count. (The client also tolerates a bare array.)
PushI18nKeysRequest:
  type: object
  properties:
    profile_id:
      type: string
      format: uuid
      description: Target profile id to add keys to.
    chunk:
      description: Logical grouping the new keys are filed under. Defaults to `default`.
      type: string
      minLength: 1
      maxLength: 64
      default: default
    keys:
      type: array
      minItems: 1
      maxItems: 5000
      items:
        type: object
        properties:
          key:
            type: string
            minLength: 1
            maxLength: 256
            description: Dotted key path, e.g. `home.cta`.
          value:
            type: string
            description: Translated value for the key.
          description:
            type: string
            description: Optional human note stored with the key.
          variables:
            type: array
            maxItems: 32
            items:
              type: string
              minLength: 1
              maxLength: 64
            description: Optional explicit list of `{{var}}` placeholder names in the value. Auto-derived from the value when omitted.
        required:
          - key
          - value
        additionalProperties: false
      description: Keys to add. Insert-only — existing keys are reported back as `skipped`.
  required:
    - profile_id
    - keys
  additionalProperties: false
  description: "Body for `POST /api/admin/i18n/keys`. Insert-only: keys that already exist are never overwritten — use `PUT /keys/{id}` to change a value."
PushI18nKeysResponse:
  type: object
  properties:
    added:
      type: array
      items:
        type: string
      description: Key names that were newly inserted.
    skipped:
      type: array
      items:
        type: string
      description: Key names that already existed and were left untouched.
    pushed_count:
      type: number
      description: Number of keys inserted (== `added.length`).
    skipped_count:
      type: number
      description: Number of keys skipped (== `skipped.length`).
    chunk:
      description: The chunk the keys were filed under.
      type: string
  required:
    - added
    - skipped
    - pushed_count
    - skipped_count
  additionalProperties: false
  description: Result of an insert-only key push.
UpdateI18nKeyRequest:
  type: object
  properties:
    value:
      type: string
      description: New value for the key (the only overwrite path).
    description:
      description: Optional human note to store with the key.
      type: string
    variables:
      description: Explicit `{{var}}` placeholder names in the value. Omit to auto-derive them from the value.
      type: array
      maxItems: 32
      items:
        type: string
        minLength: 1
        maxLength: 64
  required:
    - value
  additionalProperties: false
  description: Body for `PUT /api/admin/i18n/keys/{id}`. Updates one existing key's value.
UpdateI18nKeyResponse:
  type: object
  properties:
    id:
      type: string
      description: Id of the key that was updated.
  required:
    - id
  additionalProperties: false
  description: Updated key id.
DeleteI18nKeyResponse:
  $ref: "./common.yaml#/OkResponse"
UpsertI18nKeysRequest:
  type: object
  properties:
    profile_id:
      type: string
      format: uuid
      description: Target profile id to upsert keys into.
    chunk:
      description: Logical grouping the keys are filed under. Defaults to `default`.
      type: string
      minLength: 1
      maxLength: 64
      default: default
    keys:
      type: array
      minItems: 1
      maxItems: 5000
      items:
        type: object
        properties:
          key:
            type: string
            minLength: 1
            maxLength: 256
            description: Dotted key path, e.g. `home.cta`.
          value:
            type: string
            description: Translated value for the key.
          description:
            type: string
            description: Optional human note stored with the key.
          variables:
            type: array
            maxItems: 32
            items:
              type: string
              minLength: 1
              maxLength: 64
            description: Optional explicit list of `{{var}}` placeholder names in the value. Auto-derived from the value when omitted.
        required:
          - key
          - value
        additionalProperties: false
      description: Keys to upsert. Existing keys ARE overwritten — this is the bulk overwrite path.
  required:
    - profile_id
    - keys
  additionalProperties: false
  description: "Body for `PUT /api/admin/i18n/keys`. Bulk upsert (overwrite): existing keys are replaced, new ones inserted. Backs the devtools overlay's in-product label editing; deliberately not surfaced by the CLI or MCP."
UpsertI18nKeysResponse:
  type: object
  properties:
    upserted:
      type: number
      description: Number of keys written (inserted or overwritten).
    chunk:
      type: string
      description: The chunk the keys were filed under.
  required:
    - upserted
    - chunk
  additionalProperties: false
  description: Result of a bulk key upsert. The affected profile's KV snapshot is rebuilt (and the CDN purged) before this returns.
ListI18nDraftsResponse:
  type: array
  items:
    $ref: "#/I18nDraft"
  description: Bare array of the project's staged translation drafts.
I18nDraft:
  type: object
  properties:
    id:
      type: string
      description: Stable opaque draft id.
    name:
      type: string
      description: Draft name, e.g. the target locale being staged.
    profileId:
      type: string
      description: Profile the draft targets.
    sourceProfileId:
      anyOf:
        - type: string
        - type: "null"
      description: Profile the draft was seeded from, or `null`.
    status:
      type: string
      enum:
        - open
        - merged
        - abandoned
      description: Lifecycle state of the draft.
    createdBy:
      type: string
      description: Actor email that created the draft.
    createdAt:
      type: string
      description: ISO-8601 timestamp of creation.
    publishedAt:
      anyOf:
        - type: string
        - type: "null"
      description: ISO-8601 merge/publish timestamp, or `null`.
  required:
    - id
    - name
    - profileId
    - sourceProfileId
    - status
    - createdBy
    - createdAt
    - publishedAt
  additionalProperties: {}
  description: One staged translation draft. The shape is open — additional fields may be present.
CreateI18nDraftRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 64
      description: Draft name, e.g. the target locale being staged.
    profile_id:
      type: string
      format: uuid
      description: Profile the draft targets.
    source_profile_id:
      type: string
      format: uuid
      description: Optional profile to seed the draft's keys from.
  required:
    - name
    - profile_id
  additionalProperties: false
  description: Body for `POST /api/admin/i18n/drafts`. Stages a new translation draft against a target profile, optionally seeding from a source profile.
CreateI18nDraftResponse:
  $ref: "#/I18nDraft"
UpdateI18nDraftRequest:
  type: object
  properties:
    status:
      type: string
      enum:
        - open
        - merged
        - abandoned
      description: New lifecycle state for the draft.
  additionalProperties: false
  description: Body for `PATCH /api/admin/i18n/drafts/{draftId}`. Transitions the draft's lifecycle state.
UpdateI18nDraftResponse:
  $ref: "#/I18nDraft"
DeleteI18nDraftResponse:
  $ref: "./common.yaml#/OkResponse"
ListI18nDraftKeysResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: string
        description: Stable opaque draft-key id.
      draftId:
        type: string
        description: Id of the draft the key belongs to.
      key:
        type: string
        description: Dotted key path, e.g. `home.cta`.
      value:
        type: string
        description: Staged translated value for the key.
      description:
        description: Optional human note stored with the key, or `null`.
        anyOf:
          - type: string
          - type: "null"
      variables:
        description: "`{{var}}` placeholder names in the value, or `null` when there are none."
        anyOf:
          - type: array
            items:
              type: string
          - type: "null"
      updatedBy:
        type: string
        description: Actor email that last edited the staged key.
      updatedAt:
        type: string
        description: ISO-8601 timestamp of the last edit.
    required:
      - id
      - draftId
      - key
      - value
      - description
      - variables
      - updatedBy
      - updatedAt
    additionalProperties: false
    description: One staged draft key.
  description: Bare array of the draft's staged keys (no pagination envelope).
UpsertI18nDraftKeyRequest:
  type: object
  properties:
    key:
      type: string
      minLength: 1
      maxLength: 256
      description: Dotted key path to stage, e.g. `home.cta`.
    value:
      type: string
      description: Staged translated value for the key.
    description:
      type: string
      description: Optional human note stored with the staged key.
  required:
    - key
    - value
  additionalProperties: false
  description: "Body for `POST /api/admin/i18n/drafts/{draftId}/keys`. Upserts one staged key into an open draft — inserted when new, overwritten when it already exists. `{{var}}` placeholder names are auto-derived from the value."
UpsertI18nDraftKeyResponse:
  $ref: "./common.yaml#/OkResponse"
PublishI18nProfileRequest:
  type: object
  properties:
    chunk:
      description: Optional chunk label to stamp on the audit log. Publishing is profile-wide regardless — the whole profile is snapshotted into one KV blob.
      type: string
  additionalProperties: false
  description: Body for `POST /api/admin/i18n/profiles/{profileId}/publish`. The `chunk` is an audit label only.
PublishI18nProfileResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
      description: Always `true` on success.
    profile_id:
      type: string
      description: Profile that was published.
    chunk:
      anyOf:
        - type: string
        - type: "null"
      description: Audit chunk label, or `null` when none was given.
    published_at:
      type: string
      description: ISO-8601 timestamp of the publish.
    version:
      type: string
      description: New KV snapshot version that was shipped.
    key_count:
      type: number
      description: Number of keys in the published snapshot.
    changed:
      type: boolean
      description: Whether the snapshot's contents actually changed since the last publish.
    purged:
      type: string
      enum:
        - purged
        - skipped
        - failed
      description: "CDN purge outcome: `purged` ok, `skipped` (no creds), or `failed` (edge still stale)."
    kv_verified:
      type: boolean
      description: Whether a KV read-back confirmed the new version persisted.
    warning:
      description: Human-readable caveat when the publish landed but is not fully live.
      type: string
  required:
    - ok
    - profile_id
    - chunk
    - published_at
    - version
    - key_count
    - changed
    - purged
    - kv_verified
  additionalProperties: false
  description: Result of a profile-wide publish.
SetI18nLabelRequest:
  type: object
  properties:
    key:
      type: string
      minLength: 1
      maxLength: 256
      description: Dotted key path to set, e.g. `home.cta`.
    value:
      type: string
      description: New value for the key. Inserted when the key is new, overwritten when it exists.
    profile:
      description: Profile name to target, e.g. `en:prod`. Omit to target the project's default-marked profile.
      type: string
      minLength: 1
      maxLength: 64
    description:
      description: Optional human note to store with the key.
      type: string
  required:
    - key
    - value
  additionalProperties: false
  description: "Body for `POST /api/admin/i18n/set`. Upserts one key's value and publishes the profile live."
SetI18nLabelResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
      description: Always `true` on success.
    profile:
      type: string
      description: Name of the profile that was published.
    profile_id:
      type: string
      description: Id of the profile that was published.
    key:
      type: string
      description: The key that was set.
    value:
      type: string
      description: The value that was stored.
    published_at:
      type: string
      description: ISO-8601 timestamp of the publish.
    version:
      type: string
      description: New KV snapshot version that was shipped.
    key_count:
      type: number
      description: Number of keys in the published snapshot.
    changed:
      type: boolean
      description: Whether the snapshot's contents actually changed since the last publish.
    purged:
      type: string
      enum:
        - purged
        - skipped
        - failed
      description: "CDN purge outcome: `purged` ok, `skipped` (no creds), or `failed` (edge still stale)."
    kv_verified:
      type: boolean
      description: Whether a KV read-back confirmed the new version persisted.
    warning:
      description: Human-readable caveat when the publish landed but is not fully live.
      type: string
  required:
    - ok
    - profile
    - profile_id
    - key
    - value
    - published_at
    - version
    - key_count
    - changed
    - purged
    - kv_verified
  additionalProperties: false
  description: Result of a one-shot set-and-publish.
