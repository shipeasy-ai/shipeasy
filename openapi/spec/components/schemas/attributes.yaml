ListAttributesResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: string
        description: Stable opaque attribute id.
      name:
        type: string
        description: Attribute key as seen in evaluation context (e.g. `plan`, `country`).
      type:
        $ref: "#/AttributeType"
      enumValues:
        description: Allowed values for `enum` attributes, else `null`.
        anyOf:
          - type: array
            items:
              type: string
          - type: "null"
      required:
        type: integer
        enum:
          - 0
          - 1
        description: Whether the attribute must be present on the evaluation context (D1 stores the flag as `0`/`1`).
      description:
        description: Human note shown in the dashboard, or `null`.
        anyOf:
          - type: string
          - type: "null"
      sdkPath:
        description: Dotted path the SDK reads the value from, or `null`.
        anyOf:
          - type: string
          - type: "null"
      createdAt:
        type: string
        description: ISO-8601 creation timestamp.
      source:
        type: string
        enum:
          - auto
          - manual
        description: How the attribute came to exist — `auto` (inferred by the `/sdk/evaluate` sampler) or `manual` (declared via the UI/API).
      lastSeenAt:
        description: ISO-8601 timestamp of the most recent SDK sample that carried this attribute, or `null` when never sampled.
        anyOf:
          - type: string
          - type: "null"
      deprecated:
        type: integer
        enum:
          - 0
          - 1
        description: "`1` when an auto-discovered attribute has stopped appearing in samples. Deprecated attributes stay listed; pickers may hide or de-rank them."
    required:
      - id
      - name
      - type
    # Deliberately left open — the endpoint returns the raw attribute row, which
    # still carries undocumented internal columns; tighten to `false` only once
    # the handler projects an explicit allow-list.
    additionalProperties: {}
    description: One declared or auto-inferred targeting attribute row.
  description: Every targeting attribute in the project (declared and auto-inferred).
AttributeType:
  type: string
  enum:
    - string
    - number
    - boolean
    - enum
    - date
  description: Declared value type of a targeting attribute.
CreateAttributeRequest:
  type: object
  properties:
    name:
      type: string
      pattern: ^[a-z0-9][a-z0-9_-]{0,63}$
      description: Attribute key (lowercase alphanumeric start, then letters/digits/`_`/`-`; max 64 chars). Immutable after create.
    type:
      $ref: "#/AttributeType"
    enum_values:
      anyOf:
        - type: array
          items:
            type: string
        - type: "null"
      default: null
      description: Allowed values when `type` is `enum` (required in that case — 422 otherwise); `null` for non-enum types.
    required:
      type: boolean
      default: false
      description: Whether the attribute must be present on the evaluation context.
    description:
      type: string
      description: Optional human note shown in the dashboard.
    sdk_path:
      type: string
      description: Optional dotted path the SDK reads the value from.
  required:
    - name
    - type
  additionalProperties: false
  description: Body for `POST /api/admin/attributes`. Declares a targeting attribute.
CreateAttributeResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned attribute id.
    name:
      type: string
      description: The attribute key that was created.
  required:
    - id
    - name
  additionalProperties: false
  description: Response for `POST /api/admin/attributes`.
UpdateAttributeRequest:
  type: object
  properties:
    type:
      $ref: "#/AttributeType"
    enum_values:
      anyOf:
        - type: array
          items:
            type: string
        - type: "null"
      description: Replacement allowed values (for `enum`), or `null` to clear.
    required:
      type: boolean
      description: Whether the attribute must be present on the evaluation context.
    description:
      type: string
      description: Optional human note shown in the dashboard.
    sdk_path:
      type: string
      description: Optional dotted path the SDK reads the value from.
  additionalProperties: false
  description: "Body for `PATCH /api/admin/attributes/{id}`. Every field is optional; `name` is immutable."
UpdateAttributeResponse:
  type: object
  properties:
    id:
      type: string
      description: Id of the attribute that was updated.
  required:
    - id
  additionalProperties: false
  description: Response for `PATCH /api/admin/attributes/{id}`.
GetAttributeResponse:
  type: object
  properties:
    id:
      type: string
      description: Stable opaque attribute id.
    name:
      type: string
      description: Attribute key.
    type:
      $ref: "#/AttributeType"
    enumValues:
      anyOf:
        - type: array
          items:
            type: string
        - type: "null"
      description: Allowed values for `enum` attributes, else `null`.
    required:
      type: integer
      enum:
        - 0
        - 1
      description: Whether the attribute is required (D1 stores the flag as `0`/`1`).
    description:
      anyOf:
        - type: string
        - type: "null"
      description: Human note, or `null`.
    sdkPath:
      anyOf:
        - type: string
        - type: "null"
      description: Dotted SDK path, or `null`.
    createdAt:
      type: string
      description: ISO-8601 creation timestamp.
  required:
    - id
    - name
    - type
  additionalProperties: {}
  description: One targeting attribute row.
DeleteAttributeResponse:
  type: object
  properties:
    ok:
      type: boolean
      description: True when the attribute was archived.
  required:
    - ok
  additionalProperties: false
  description: Response for `DELETE /api/admin/attributes/{id}`.
