ListAlertRulesResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: string
        description: Stable opaque alert-rule id.
      name:
        type: string
        description: Human label for the rule.
      metricId:
        type: string
        description: Id of the metric the rule evaluates. Immutable after create.
      metricName:
        anyOf:
          - type: string
          - type: "null"
        description: Display name of the bound metric, or `null` if the metric no longer exists.
      comparator:
        type: string
        enum:
          - gt
          - gte
          - lt
          - lte
        description: How the metric value is compared to the threshold (gt/gte/lt/lte).
      threshold:
        type: number
        description: Threshold the metric value is compared against.
      windowHours:
        type: integer
        minimum: -9007199254740991
        maximum: 9007199254740991
        description: Lookback window (hours) the metric is aggregated over.
      severity:
        type: string
        enum:
          - danger
          - warn
          - info
        description: Severity of the raised alert.
      enabled:
        type: boolean
        description: Whether the rule is evaluated by the cron.
      notify:
        anyOf:
          - type: object
            properties:
              slackChannel:
                description: Slack channel to post this rule's alert to. Requires a Slack connector.
                anyOf:
                  - type: object
                    properties:
                      id:
                        type: string
                        minLength: 1
                        description: Slack channel id (e.g. C0123ABCD).
                      name:
                        type: string
                        minLength: 1
                        description: "Slack channel name (without the leading #)."
                    required:
                      - id
                      - name
                    additionalProperties: false
                  - type: "null"
              email:
                description: Email address to notify for this rule (overrides the default recipient).
                anyOf:
                  - type: string
                    format: email
                    pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                  - type: "null"
            additionalProperties: false
          - type: "null"
        description: Delivery target for this rule's alert; `null` = use the project default.
      createdAt:
        type: string
        description: ISO-8601 timestamp of creation.
      updatedAt:
        type: string
        description: ISO-8601 timestamp of the last update.
    required:
      - id
      - name
      - metricId
      - metricName
      - comparator
      - threshold
      - windowHours
      - severity
      - enabled
      - notify
      - createdAt
      - updatedAt
    additionalProperties: false
    description: One metric-threshold alert rule.
CreateAlertRuleRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 120
      description: Human label for the rule, shown on the alert and the rules list.
    metricId:
      type: string
      minLength: 1
      description: Id of the metric to evaluate.
    comparator:
      type: string
      enum:
        - gt
        - gte
        - lt
        - lte
      description: How the metric value is compared to the threshold (gt/gte/lt/lte).
    threshold:
      type: number
      description: Threshold the metric value is compared against.
    windowHours:
      default: 24
      description: Lookback window (hours) the metric is aggregated over. 1–720.
      type: integer
      minimum: 1
      maximum: 720
    severity:
      default: warn
      description: Severity of the raised alert.
      type: string
      enum:
        - danger
        - warn
        - info
    enabled:
      default: true
      description: Whether the rule is evaluated by the cron.
      type: boolean
    notify:
      description: Where to deliver this rule's alert (Slack channel and/or email target).
      anyOf:
        - type: object
          properties:
            slackChannel:
              description: Slack channel to post this rule's alert to. Requires a Slack connector.
              anyOf:
                - type: object
                  properties:
                    id:
                      type: string
                      minLength: 1
                      description: Slack channel id (e.g. C0123ABCD).
                    name:
                      type: string
                      minLength: 1
                      description: "Slack channel name (without the leading #)."
                  required:
                    - id
                    - name
                  additionalProperties: false
                - type: "null"
            email:
              description: Email address to notify for this rule (overrides the default recipient).
              anyOf:
                - type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                - type: "null"
          additionalProperties: false
        - type: "null"
  required:
    - name
    - metricId
    - comparator
    - threshold
  additionalProperties: false
CreateAlertRuleResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned alert-rule id.
  required:
    - id
  additionalProperties: false
