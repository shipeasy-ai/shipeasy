ListAlertRulesResponse:
  type: array
  items:
    type: object
    properties:
      id:
        type: string
        description: Stable opaque alert-rule id.
      name:
        type: string
        description: Human label for the rule.
      metricId:
        type: string
        description: Id of the metric the rule evaluates. Immutable after create.
      metricName:
        anyOf:
          - type: string
          - type: "null"
        description: Display name of the bound metric, or `null` if the metric no longer exists.
      comparator:
        type: string
        enum:
          - gt
          - gte
          - lt
          - lte
        description: How the metric value is compared to the threshold (gt/gte/lt/lte).
      threshold:
        type: number
        description: Threshold the metric value is compared against.
      windowHours:
        type: integer
        minimum: -9007199254740991
        maximum: 9007199254740991
        description: Lookback window (hours) the metric is aggregated over.
      severity:
        type: string
        enum:
          - danger
          - warn
          - info
        description: Severity of the raised alert.
      enabled:
        type: boolean
        description: Whether the rule is evaluated by the cron.
      notify:
        $ref: ./common.yaml#/NotificationTarget
      createdAt:
        type: string
        description: ISO-8601 timestamp of creation.
      updatedAt:
        type: string
        description: ISO-8601 timestamp of the last update.
    required:
      - id
      - name
      - metricId
      - metricName
      - comparator
      - threshold
      - windowHours
      - severity
      - enabled
      - notify
      - createdAt
      - updatedAt
    additionalProperties: false
    description: One metric-threshold alert rule.
CreateAlertRuleRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 120
      description: Human label for the rule, shown on the alert and the rules list.
    metricId:
      type: string
      minLength: 1
      description: Id of the metric to evaluate.
    comparator:
      type: string
      enum:
        - gt
        - gte
        - lt
        - lte
      description: How the metric value is compared to the threshold (gt/gte/lt/lte).
    threshold:
      type: number
      description: Threshold the metric value is compared against.
    windowHours:
      default: 24
      description: Lookback window (hours) the metric is aggregated over. 1–720.
      type: integer
      minimum: 1
      maximum: 720
    severity:
      default: warn
      description: Severity of the raised alert.
      type: string
      enum:
        - danger
        - warn
        - info
    enabled:
      default: true
      description: Whether the rule is evaluated by the cron.
      type: boolean
    notify:
      $ref: ./common.yaml#/NotificationTarget
  required:
    - name
    - metricId
    - comparator
    - threshold
  additionalProperties: false
CreateAlertRuleResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned alert-rule id.
  required:
    - id
  additionalProperties: false
UpdateAlertRuleRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 120
    comparator:
      type: string
      enum:
        - gt
        - gte
        - lt
        - lte
    threshold:
      type: number
    windowHours:
      type: integer
      minimum: 1
      maximum: 720
    severity:
      type: string
      enum:
        - danger
        - warn
        - info
    enabled:
      type: boolean
    notify:
      $ref: ./common.yaml#/NotificationTarget
  additionalProperties: false
UpdateAlertRuleResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned alert-rule id.
  required:
    - id
  additionalProperties: false
DeleteAlertRuleResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
  required:
    - ok
  additionalProperties: false
