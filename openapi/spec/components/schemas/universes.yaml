ListUniversesResponse:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: Stable opaque universe id.
          name:
            type: string
            maxLength: 128
            pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
            description: Stable universe key. Single segment or `folder.name`. Lowercase letters, digits, `_` or `-`; max 128 chars. Immutable after create.
          unitType:
            type: string
            description: Unit of randomisation. Snake-case in request (`unit_type`), camelCase in response.
          holdoutRange:
            anyOf:
              - type: array
                items:
                  type: number
                minItems: 2
                maxItems: 2
              - type: "null"
            description: Reserved holdout bucket range, or `null` if none.
          createdAt:
            type: string
            description: ISO-8601 timestamp of creation.
        required:
          - id
          - name
          - unitType
          - holdoutRange
          - createdAt
        additionalProperties: false
    next_cursor:
      anyOf:
        - type: string
        - type: "null"
  required:
    - data
    - next_cursor
  additionalProperties: false
CreateUniverseRequest:
  type: object
  properties:
    name:
      type: string
      maxLength: 128
      pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
      description: Stable universe key. Single segment or `folder.name`. Lowercase letters, digits, `_` or `-`; max 128 chars. Immutable after create.
    folder:
      description: "Optional folder name used to group items in the dashboard. Part of the SDK lookup key: an item in folder `checkout` named `new-cart` is referenced as `checkout/new-cart` from the SDK."
      anyOf:
        - type: string
          maxLength: 256
          pattern: ^[a-zA-Z0-9_-]+$
        - type: "null"
    unit_type:
      default: user_id
      description: Unit of randomisation. Typically `user_id`. Use `account_id` to keep whole accounts in the same group across an experiment.
      type: string
    holdout_range:
      default: null
      anyOf:
        - type: array
          items:
            type: integer
            minimum: 0
            maximum: 9999
          minItems: 2
          maxItems: 2
        - type: "null"
      description: Inclusive `[lo, hi]` bucket range (0–9999) reserved as the **holdout** — callers hashed into this slice are excluded from every experiment in the universe. `null` disables the holdout. Pro plan or higher required.
  required:
    - name
    - unit_type
    - holdout_range
  additionalProperties: false
  description: Body for `POST /api/admin/universes`. Only `name` is required.
CreateUniverseResponse:
  type: object
  properties:
    id:
      type: string
      description: Newly assigned universe id.
    name:
      type: string
      maxLength: 128
      pattern: ^[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9_-]*[a-z0-9])?)?$
      description: Stable universe key. Single segment or `folder.name`. Lowercase letters, digits, `_` or `-`; max 128 chars. Immutable after create.
  required:
    - id
    - name
  additionalProperties: false
UpdateUniverseRequest:
  type: object
  properties:
    folder:
      description: "Optional folder name used to group items in the dashboard. Part of the SDK lookup key: an item in folder `checkout` named `new-cart` is referenced as `checkout/new-cart` from the SDK."
      anyOf:
        - type: string
          maxLength: 256
          pattern: ^[a-zA-Z0-9_-]+$
        - type: "null"
    holdout_range:
      anyOf:
        - type: array
          items:
            type: integer
            minimum: 0
            maximum: 9999
          minItems: 2
          maxItems: 2
        - type: "null"
      description: Inclusive `[lo, hi]` bucket range (0–9999) reserved as the **holdout** — callers hashed into this slice are excluded from every experiment in the universe. `null` disables the holdout. Pro plan or higher required.
  additionalProperties: false
  description: Body for `PATCH /api/admin/universes/{id}`. Only `holdout_range` is mutable — name and unit_type are immutable after create.
UpdateUniverseResponse:
  type: object
  properties:
    id:
      type: string
      description: Universe id that was updated.
  required:
    - id
  additionalProperties: false
DeleteUniverseResponse:
  type: object
  properties:
    ok:
      type: boolean
      const: true
  required:
    - ok
  additionalProperties: false
