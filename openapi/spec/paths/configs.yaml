/api/admin/configs/{id}/versions:
  get:
    operationId: listConfigVersions
    summary: List config version history
    description: |-
      Returns every published version of the config's value on one env, newest first. The `env` query parameter picks the environment (`dev`, `staging`, or `prod`) and defaults to `prod`; an unknown env returns `400`. The config's JSON Schema is config-level and not versioned — this is value history only.

      **Use case:** Render the History timeline in the config detail pane (value diff + restore), or audit which value was live on prod at a given version.
    tags:
      - Configs
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque config id (`cfg_…`) or the config's `name`.
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
      - name: env
        in: query
        required: false
        description: Environment to list history for (`dev`, `staging`, or `prod`). Defaults to `prod` when omitted.
        schema:
          $ref: ../components/schemas/common.yaml#/Env
    responses:
      "200":
