/api/admin/experiments/{id}/status:
  post:
    operationId: setExperimentStatus
    summary: Transition experiment status
    description: |-
      Drives the experiment lifecycle. Allowed transitions:

      - `draft → running` — starts allocation. Bumps the `startedAt` timestamp.
      - `running → stopped` — halts allocation. Existing exposures stay in the dataset.
      - `stopped → archived` — soft-delete.
      - `draft → archived` — discard an unstarted experiment.
      - `archived → draft` — restore a soft-deleted experiment so it can be re-completed and started. Allowed only if it never started; one that already ran must be cloned instead.

      Restarting an `archived` experiment directly is not allowed — restore it to `draft` first. Returns `409` on illegal transitions and `429` if the plan's `experiments_running` limit is exceeded on `→ running`.

      **Use cases**

      - **Start** — `{ "status": "running" }` after wiring up the SDK and verifying targeting on staging.
      - **Stop** — `{ "status": "stopped" }` once the experiment hits its `min_runtime_days` and conclusive results land.
      - **Archive** — `{ "status": "archived" }` to soft-delete after sign-off.
    tags:
      - Experiments
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque experiment id (`exp_…`) or the experiment's `name`.
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/experiments.yaml#/SetExperimentStatusRequest
          examples:
            start:
              summary: Start — draft → running
              description: Begins allocation. The experiment counts against the plan's `experiments_running` limit.
              value:
                status: running
            stop:
              summary: Stop — running → stopped
              description: Halts allocation. Existing exposures remain analysable.
              value:
                status: stopped
            archive:
              summary: Archive — stopped → archived
              description: Soft-deletes the experiment. List endpoints exclude archived rows by default.
              value:
                status: archived
            restore:
              summary: Restore — archived → draft
              description: Un-deletes a soft-deleted experiment so it can be re-completed and started. Allowed only if it never ran.
              value:
                status: draft
    responses:
      "201":
        description: Transition experiment status
        content:
          application/json:
            schema:
              $ref: ../components/schemas/experiments.yaml#/SetExperimentStatusResponse
            example:
              id: exp_01j7wb12c3d4e5f6g7h8j9k0l1
              status: running
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - INVALID_TRANSITION
      - VALIDATION
    x-cli:
      positional:
        - id
      commands:
        - name: start
          summary: Start an experiment (draft → running)
          preset:
            status: running
        - name: stop
          summary: Stop a running experiment
          preset:
            status: stopped
        - name: restore
          summary: Restore an archived experiment (→ draft)
          preset:
            status: draft
/api/admin/experiments/{id}/metrics:
  post:
    operationId: setExperimentMetrics
    summary: Attach metrics
    description: |-
      Replaces the experiment's metric attachments wholesale. Each entry pairs an existing `metric_id` with a `role` (`goal` / `guardrail` / `secondary`).

      Returns `422` if any `metric_id` doesn't exist in the project. Pass `{ metrics: [] }` to detach everything.

      **Use cases**

      - **Standard setup** — one `goal`, one or two `guardrail`, optional `secondary` metrics for diagnostics.
      - **Detach all** — send `{ "metrics": [] }` before archiving.
    tags:
      - Experiments
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque experiment id (`exp_…`) or the experiment's `name`.
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/experiments.yaml#/SetExperimentMetricsRequest
          examples:
            standard:
              summary: Standard — one goal + one guardrail
              description: Attaches one decision metric and one safety metric.
              value:
                metrics:
                  - metric_id: met_checkout_completed
                    role: goal
                  - metric_id: met_page_errors
                    role: guardrail
            detach:
              summary: Detach all
              description: Send an empty array to clear every metric.
              value:
                metrics: []
    responses:
      "201":
        description: Attach metrics
        content:
          application/json:
            schema:
              $ref: ../components/schemas/experiments.yaml#/SetExperimentMetricsResponse
            example:
              id: exp_01j7wb12c3d4e5f6g7h8j9k0l1
              metrics:
                - metric_id: met_checkout_completed
                  role: goal
                - metric_id: met_page_errors
                  role: guardrail
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - EVENT_PENDING
      - REFERENCED_NOT_FOUND
      - VALIDATION
    x-cli:
      name: set-metrics
      positional:
        - id
