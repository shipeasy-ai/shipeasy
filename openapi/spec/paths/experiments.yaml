              $ref: ../components/schemas/experiments.yaml#/GetExperimentResponse
            example:
              id: exp_01j7wb12c3d4e5f6g7h8j9k0l1
              name: checkout_button_color
              description: Test green vs. blue CTA on the checkout page.
              tag: checkout
              status: running
              universe: primary_users
              targetingGate: null
              allocationPct: 5000
              salt: 8d3e9a1f6b7c4a5fa1c2b6d3e7c8e3a1
              params:
                cta_color: string
              groups:
                - name: control
                  weight: 5000
                  params:
                    cta_color: blue
                - name: treatment
                  weight: 5000
                  params:
                    cta_color: green
              significanceThreshold: 0.05
              minRuntimeDays: 7
              minSampleSize: 1000
              sequentialTesting: false
              startedAt: 2026-05-01T12:00:00.000Z
              stoppedAt: null
              updatedAt: 2026-05-09T18:22:11.000Z
