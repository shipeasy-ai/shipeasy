/api/admin/experiments:
  get:
    operationId: listExperiments
    summary: List experiments
    description: |-
      Returns a single page of non-archived experiments ordered by `updated_at desc, id desc`. Use the `cursor` query parameter to paginate.

      **Use case:** Snapshot every active experiment in the project — e.g. render an overview dashboard or drive a CI check that no experiment has been running past its `min_runtime_days`.
    tags:
      - Experiments
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - $ref: ../components/parameters.yaml#/PaginationLimit
      - $ref: ../components/parameters.yaml#/PaginationCursor
    responses:
      "200":
        description: List experiments
        content:
          application/json:
            schema:
              $ref: ../components/schemas/experiments.yaml#/ListExperimentsResponse
            example:
              data:
                - id: exp_01j7wb12c3d4e5f6g7h8j9k0l1
                  name: checkout_button_color
                  description: Test green vs. blue CTA on the checkout page.
                  tag: checkout
                  status: running
                  universe: primary_users
                  targetingGate: null
                  allocationPct: 5000
                  salt: 8d3e9a1f6b7c4a5fa1c2b6d3e7c8e3a1
                  params:
                    cta_color: string
                  groups:
                    - name: control
                      weight: 5000
                      params:
                        cta_color: blue
                    - name: treatment
                      weight: 5000
                      params:
                        cta_color: green
                  significanceThreshold: 0.05
                  minRuntimeDays: 7
                  minSampleSize: 1000
                  sequentialTesting: false
                  startedAt: 2026-05-01T12:00:00.000Z
                  stoppedAt: null
                  updatedAt: 2026-05-09T18:22:11.000Z
              next_cursor: null
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
    x-cli:
      name: list
  post:
    operationId: createExperiment
    summary: Create an experiment
    description: |-
      Creates a new experiment in `draft` status. `name`, `universe`, and `groups` are required; everything else has sensible defaults.

      Returns `409` if `name` already exists, `422` if the named universe doesn't exist, `403` if a plan-gated option is set (`sequential_testing`, custom `significance_threshold`) on a plan that doesn't include it.

      **Use cases**

      - **Minimal 50/50** — `name` + `universe` + two equal-weight groups.
      - **Targeted rollout** — supply `targeting_gate` to restrict the eligible audience and `allocation_pct` to enrol a slice of it.
      - **Multivariant** — three or more groups with weights summing to 10000.
      - **Sequential testing** — `sequential_testing: true` for Premium plans.
    tags:
      - Experiments
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/experiments.yaml#/CreateExperimentRequest
          examples:
            minimal:
              summary: Minimal — two-group 50/50
              description: Smallest valid body. Two groups at 50/50, no allocation, no targeting.
              value:
                name: checkout_button_color
                universe: primary_users
                groups:
                  - name: control
                    weight: 5000
                  - name: treatment
                    weight: 5000
            targeted:
              summary: Targeted — gate + allocation + params
              description: Gate the audience with a `targeting_gate`, allocate 50% of it, and parameterise the variants.
              value:
                name: checkout_button_color
                description: Green CTA on checkout for Pro users.
                universe: primary_users
                targeting_gate: pro_plan_only
                allocation_pct: 5000
                params:
                  cta_color: string
                groups:
                  - name: control
                    weight: 5000
                    params:
                      cta_color: blue
                  - name: treatment
                    weight: 5000
                    params:
                      cta_color: green
            multivariant:
              summary: Multivariant — three groups
              description: Three variants splitting 40/30/30. Requires the sum to equal 10000.
              value:
                name: headline_test
                universe: primary_users
                groups:
                  - name: control
                    weight: 4000
                  - name: alt_a
                    weight: 3000
                  - name: alt_b
                    weight: 3000
            sequential:
              summary: Sequential testing — Premium plan
              description: Enable always-valid sequential tests. Requires Premium plan or higher.
              value:
                name: checkout_button_color
                universe: primary_users
                groups:
                  - name: control
                    weight: 5000
                  - name: treatment
                    weight: 5000
                sequential_testing: true
                min_runtime_days: 14
    responses:
      "201":
        description: Create an experiment
        content:
          application/json:
            schema:
              $ref: ../components/schemas/experiments.yaml#/CreateExperimentResponse
            example:
              id: exp_01j7wb12c3d4e5f6g7h8j9k0l1
              name: checkout_button_color
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - PLAN_REQUIRED
      - ALREADY_EXISTS
      - GROUPS_WEIGHT_SUM
      - REFERENCED_NOT_FOUND
      - VALIDATION
    x-cli:
      name: create
      positional:
        - name
