      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
    x-cli:
      name: get
      positional:
        - id
  patch:
    operationId: updateExperiment
    summary: Update an experiment
    description: |-
      Partial update. `allocation_pct`, `groups`, `salt`, `universe`, `params` are **immutable while running** — returns `409` if you try. Stop the experiment first.

      Editing `groups` while in `draft` is fine; weights must still sum to 10000.

      **Use cases**

      - **Update metadata** — `description`, `tag`, `targeting_gate` editable any time.
      - **Ramp before launch** — set `allocation_pct` while still in `draft`.
      - **Tighten significance** — `significance_threshold` (Pro+).
      - **Rewire groups** — replace `groups` wholesale while in `draft`; immutable once running.
    tags:
      - Experiments
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque experiment id (`exp_…`) or the experiment's `name`.
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/experiments.yaml#/UpdateExperimentRequest
          examples:
            rampAllocation:
              summary: Ramp allocation — 0 → 50%
              description: Bumps the share of the targeted audience enrolled. Allowed only when the experiment is in `draft`.
              value:
                allocation_pct: 5000
            changeWeights:
              summary: Change group weights
              description: Replace the groups array — weights must still sum to 10000.
              value:
                groups:
                  - name: control
                    weight: 2500
                  - name: treatment
                    weight: 7500
            tighterSignificance:
              summary: Tighter significance threshold
              description: Drop the p-value cutoff from 0.05 → 0.01. Requires Pro plan or higher.
              value:
                significance_threshold: 0.01
            updateMetadata:
              summary: Update metadata
              description: Change description/tag/targeting_gate freely on running experiments.
              value:
                description: Bumped to 50% after passing canary on 25%.
                tag: checkout
    responses:
      "200":
        description: Update an experiment
        content:
          application/json:
            schema:
              $ref: ../components/schemas/experiments.yaml#/UpdateExperimentResponse
            example:
              id: exp_01j7wb12c3d4e5f6g7h8j9k0l1
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - PLAN_REQUIRED
      - NOT_FOUND
      - IMMUTABLE_FIELD
      - INVALID_TRANSITION
      - GROUPS_WEIGHT_SUM
      - REFERENCED_NOT_FOUND
      - VALIDATION
    x-cli:
      name: update
      positional:
        - id
