  patch:
    operationId: updateErrorStatus
    summary: Update a tracked error's status
    description: |-
      Flips the triage state of one error — the only mutation this surface allows. Valid transitions are between `open`, `resolved`, and `ignored`; the body must carry exactly `{ "status": … }`.

      A `resolved` error reopens automatically (ingestion-side) if it recurs; `ignored` is sticky until flipped back here. Returns the updated row.

      **Use cases**

      - **Triage** — `{ "status": "ignored" }` to suppress a known-benign issue from the open list.
      - **Close out** — `{ "status": "resolved" }` once the fix lands; it reopens on its own if the error recurs.
    tags:
      - Errors
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque error id (`err_…`).
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors-api.yaml#/UpdateErrorStatusRequest
          examples:
            resolve:
              summary: Mark resolved
              description: Close the error once the fix is deployed. It reopens automatically if it recurs.
              value:
                status: resolved
            ignore:
              summary: Ignore a benign issue
              description: Suppress a known-benign error from the open list. Sticky until flipped back.
              value:
                status: ignored
    responses:
      "200":
        description: Update a tracked error's status
        content:
          application/json:
            schema:
              $ref: ../components/schemas/errors-api.yaml#/ErrorRecord
            example:
              id: err_01j7w7m9q4hxbf6npe6s9zr3vc
              projectId: e976b15e-2f0d-4c6e-9b1a-3a7c1f2d8e90
