/api/admin/errors:
  get:
    operationId: listErrors
    summary: List tracked errors
    description: |-
      Returns a single page of tracked production errors as a **bare JSON array** (no pagination envelope), ordered by `lastSeenAt desc`. Filter with `status`, free-text-search with `q`, and cap the page with `limit`.

      Tracked errors are never filed by hand — an ingestion path (worker log drain / the `see()` SDK reporter) folds each occurrence into a row keyed by `fingerprint`, bumping `count` and `lastSeenAt`. This surface only reads them and (via PATCH) flips their `status`.

      **Use case:** Snapshot the project's open issues for a triage dashboard, or drive a CI gate that fails the build when any `open` error of `kind: uncaught` exists in `prod`.
    tags:
      - Errors
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: status
        in: query
        required: false
        description: Filter by triage state. `all` (the default) returns every status.
        schema:
          type: string
          enum:
            - open
            - resolved
            - ignored
            - all
          default: all
      - name: q
        in: query
        required: false
        description: Case-insensitive substring match against `message`, `errorType`, and `subject`.
        schema:
          type: string
          maxLength: 200
      - name: limit
        in: query
        required: false
        description: Maximum number of rows to return (1–500). Defaults to 200.
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 200
    responses:
      "200":
        description: List tracked errors
        content:
          application/json:
            schema:
              $ref: ../components/schemas/errors-api.yaml#/ListErrorsResponse
            example:
              - id: err_01j7w7m9q4hxbf6npe6s9zr3vc
                projectId: e976b15e-2f0d-4c6e-9b1a-3a7c1f2d8e90
                fingerprint: 9c1f4f1f2c0c4a5fa1c2b6d3e7c8e3a1
                causedByFingerprint: null
                message: Cannot read properties of undefined (reading 'id')
                errorType: TypeError
                stack: |-
                  TypeError: Cannot read properties of undefined (reading 'id')
                      at GateEditor (/app/gates/[id]/page.tsx:42:18)
                source: shipeasy
                url: https://app.example.com/dashboard/gat_01j7/edit
