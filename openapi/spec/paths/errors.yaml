/api/admin/errors/{id}/series:
  post:
    operationId: getErrorSeries
    summary: Get an error's occurrence series
    description: |-
      Returns a bucketed occurrence timeseries for one tracked error (by its fingerprint), read from the `shipeasy_errors` Analytics Engine dataset (near-real-time; ingest lag is seconds). The window bounds are epoch **seconds**; `to` must be strictly greater than `from`. The response echoes the SQL that produced the rows.

      **Use case:** Render the trend sparkline / occurrence chart on the error detail panel, or pull the raw bucketed counts to alert when an issue's rate spikes.
    tags:
      - Errors
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque error id (`err_…`).
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/errors-api.yaml#/ErrorSeriesRequest
          examples:
            lastDayHourly:
              summary: Last 24h, hourly buckets
              description: Hourly occurrence counts over a one-day window (bounds in epoch seconds).
              value:
                from: 1751000400
                to: 1751086800
                bucket: 3600
    responses:
      "200":
        description: Get an error's occurrence series
        content:
          application/json:
            schema:
              $ref: ../components/schemas/errors-api.yaml#/ErrorSeriesResponse
            example:
              sql: |-
                SELECT intDiv(toUInt32(double2), 3600) * 3600 AS t,
                  sum(double1 * _sample_interval) AS v
                FROM shipeasy_errors
                WHERE index1 = 'e976b15e-2f0d-4c6e-9b1a-3a7c1f2d8e90'
                  AND blob1 = '9c1f4f1f2c0c4a5fa1c2b6d3e7c8e3a1'
                  AND double2 >= 1751000400 AND double2 < 1751086800
                GROUP BY t
                ORDER BY t
              rows:
                - t: 1751000400
                  v: 12
                - t: 1751004000
                  v: 31
                - t: 1751007600
                  v: 27
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
    x-cli:
      name: series
      positional:
        - id
