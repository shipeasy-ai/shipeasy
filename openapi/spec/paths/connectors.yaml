  patch:
    operationId: updateConnector
    summary: Update a connector
    description: |-
      Partial update — only supplied fields change. `events` and `config` **replace** wholesale; there is no merge or append. Secrets cannot be set through this endpoint (credential rotation goes through the provider-specific re-register flow).

      The response carries only `{ id }` — re-fetch via `GET /api/admin/connectors/{id}` for the new row.

      **Use cases**

      - **Pause a connector** — `{ "enabled": false }`. Stops all dispatch / auto-fire without deleting it.
      - **Change subscribed events** — send the full new `events` array. An empty array unsubscribes the connector from every event.
      - **Rename** — `{ "name": "Bugs → acme/app issues" }`.
      - **Retarget** — send a new `config` (e.g. a different Sheets `sheetTitle`); it replaces the stored config wholesale.
    tags:
      - Connectors
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque connector id.
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/connectors.yaml#/UpdateConnectorRequest
          examples:
            pause:
              summary: Pause — disable the connector
              description: 'Stops all dispatch / auto-fire. Re-enable with `{ "enabled": true }`.'
              value:
                enabled: false
            resubscribe:
              summary: Replace subscribed events
              description: "Array fields replace wholesale. Send the full new list; an empty array unsubscribes from everything."
              value:
                events:
                  - bug.created
                  - feature_request.created
            retarget:
              summary: Retarget config
              description: Replaces the stored non-secret config wholesale.
              value:
                config:
                  spreadsheetId: 1AbC…
                  sheetTitle: Bugs Q3
    responses:
      "200":
        description: Update a connector
        content:
          application/json:
            schema:
              $ref: ../components/schemas/connectors.yaml#/UpdateConnectorResponse
            example:
              id: 9b0e7c2a-1f3d-4a8e-bf21-0c6a2e5d7f10
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - VALIDATION
    x-cli:
      name: update
      positional:
        - id
  delete:
    operationId: deleteConnector
    summary: Delete a connector
    description: |-
      Permanently removes the connector and its stored credentials.

      **Use case:** Disconnect an integration for good — e.g. tear down a `github` connector after migrating bug routing elsewhere.
    tags:
      - Connectors
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: Stable opaque connector id.
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
    responses:
      "200":
        description: Delete a connector
        content:
          application/json:
            schema:
              $ref: ../components/schemas/connectors.yaml#/DeleteConnectorResponse
            example:
              ok: true
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
