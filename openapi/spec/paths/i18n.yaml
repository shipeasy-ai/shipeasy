/api/admin/i18n/profiles:
  get:
    operationId: listI18nProfiles
    summary: List i18n profiles
    description: |-
      Returns every locale profile in the project (e.g. `en:prod`, `fr:prod`).

      **Use case:** Discover which locale profiles exist before pushing keys or publishing a chunk.
    tags:
      - Profiles
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
    responses:
      "200":
        description: List i18n profiles
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/ListI18nProfilesResponse
            example:
              - id: i18n_01j7w8a1b2c3
                name: en:prod
                isDefault: 1
                createdAt: 2026-04-12T10:14:08.000Z
                deletedAt: null
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
    x-cli:
      name: list
  post:
    operationId: createI18nProfile
    summary: Create an i18n profile
    description: |-
      Create a locale profile. `name` is the stable handle (e.g. `fr:prod`).

      **Use case:** Stand up a new locale before seeding its keys.
    tags:
      - Profiles
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/i18n.yaml#/CreateI18nProfileRequest
          example:
            name: fr:prod
    responses:
      "201":
        description: Create an i18n profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/CreateI18nProfileResponse
            example:
              id: i18n_01j7w8a1b2c4
              name: fr:prod
        links:
          PublishI18nProfile:
            operationId: publishI18nProfile
            parameters: { profileId: $response.body#/id }
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - ALREADY_EXISTS
      - VALIDATION
    x-cli:
      name: create
/api/admin/i18n/keys:
  get:
    operationId: listI18nKeys
    summary: List i18n keys
    description: |-
      List keys for a profile, optionally filtered to a name `prefix`.

      **Use case:** Read the current keys (and values) for a profile — e.g. to diff before a push.
    tags:
      - Keys
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: profile_id
        in: query
        required: false
        description: Profile id to list keys for.
        schema:
          type: string
      - name: prefix
        in: query
        required: false
        description: Only keys whose name starts with this.
        schema:
          type: string
      - name: q
        in: query
        required: false
        description: Free-text search — matches keys whose name, value, OR description contains this substring (case-insensitive). Use it to find the key behind a piece of on-screen copy.
        schema:
          type: string
          maxLength: 100
      - name: limit
        in: query
        required: false
        description: Max keys to return (1–500).
        schema:
          type: integer
          minimum: 1
          maximum: 500
      - name: offset
        in: query
        required: false
        description: Number of keys to skip before returning `limit` rows (offset pagination).
        schema:
          type: integer
          minimum: 0
          default: 0
    responses:
      "200":
        description: List i18n keys
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/ListI18nKeysResponse
            example:
              keys:
                - id: key_01j7
                  key: checkout.cta
                  value: Buy now
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
    x-cli:
      name: list
  post:
    operationId: pushI18nKeys
    summary: Push new i18n keys (insert-only)
    description: |-
      Add NEW keys to a profile. Insert-only — existing keys are left untouched (overwrite one with `updateI18nKey`).

      **Use case:** Seed newly-extracted keys without clobbering translations already in the profile.
    tags:
      - Keys
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/i18n.yaml#/PushI18nKeysRequest
          example:
            profile_id: i18n_01j7w8a1b2c3
            keys:
              - key: checkout.cta
                value: Buy now
    responses:
      "201":
        description: Push new i18n keys (insert-only)
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/PushI18nKeysResponse
            example:
              added:
                - checkout.cta
              skipped: []
              pushed_count: 1
              skipped_count: 0
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - ALREADY_EXISTS
      - VALIDATION
    x-cli:
      name: push
  put:
    operationId: upsertI18nKeys
    summary: Bulk upsert i18n keys (overwrite)
    description: |-
      Bulk upsert keys into a profile — existing keys ARE overwritten, new ones inserted. The profile's KV snapshot is rebuilt and the CDN purged before the call returns, so the edits go live on their own.

      This is the overwrite counterpart of the insert-only `pushI18nKeys`. It backs the devtools overlay's in-product "Apply changes" label editing and is deliberately not surfaced by the CLI or MCP — those surfaces only expose the insert-only push so a whole `en.json` can't wholesale-overwrite prod.

      **Use case:** Apply a batch of in-product label edits (devtools overlay) in one call.
    tags:
      - Keys
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/i18n.yaml#/UpsertI18nKeysRequest
          example:
            profile_id: 3f1a6c2e-1b2c-4d5e-8f90-0a1b2c3d4e5f
            keys:
              - key: checkout.cta
                value: Buy it now
    responses:
      "200":
        description: Bulk upsert i18n keys (overwrite)
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/UpsertI18nKeysResponse
            example:
              upserted: 1
              chunk: default
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - VALIDATION
/api/admin/i18n/keys/{id}:
  put:
    operationId: updateI18nKey
    summary: Update one i18n key
    description: |-
      Overwrite a single existing key's value — the only overwrite path.

      The change goes live on its own: the profile's KV snapshot is rebuilt and the CDN purged as part of this call, so no separate profile publish is needed.

      **Use case:** Correct or re-translate a single string in place.
    tags:
      - Keys
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: The key's id.
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/i18n.yaml#/UpdateI18nKeyRequest
          example:
            value: Buy it now
    responses:
      "200":
        description: Update one i18n key
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/UpdateI18nKeyResponse
            example:
              id: key_01j7
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - VALIDATION
    x-cli:
      name: update
      positional:
        - id
  delete:
    operationId: deleteI18nKey
    summary: Delete one i18n key
    description: |-
      Permanently delete a single key from its profile. The profile's KV snapshot is rebuilt and the CDN purged as part of this call, so the removal goes live on its own.

      **Use case:** Remove a stale or mistakenly-pushed key without touching the rest of the profile.
    tags:
      - Keys
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: id
        in: path
        required: true
        description: The key's id.
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
    responses:
      "200":
        description: Delete one i18n key
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/DeleteI18nKeyResponse
            example:
              ok: true
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
/api/admin/i18n/profiles/{profileId}:
  delete:
    operationId: deleteI18nProfile
    summary: Delete an i18n profile
    description: |-
      Soft-delete a locale profile. The project's default profile cannot be deleted (409). The profile's keys are retained in the database but the profile no longer resolves for listing or publishing.

      **Use case:** Retire a locale that is no longer shipped.
    tags:
      - Profiles
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: profileId
        in: path
        required: true
        description: The profile id to delete.
        schema:
          $ref: ../components/schemas/common.yaml#/ResourceId
    responses:
      "200":
        description: Delete an i18n profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/DeleteI18nProfileResponse
            example:
              ok: true
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - READ_ONLY
