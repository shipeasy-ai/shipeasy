      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/i18n.yaml#/UpdateI18nDraftRequest
          example:
            status: merged
    responses:
      "200":
        description: Update a translation draft
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/UpdateI18nDraftResponse
            example:
              id: draft_01j7
              status: merged
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - VALIDATION
    x-cli:
      name: update
      positional:
        - draftId
/api/admin/i18n/profiles/{profileId}/publish:
  post:
    operationId: publishI18nProfile
    summary: Publish a profile live
    description: |-
      Publish a profile to the CDN — rebuild its KV snapshot + purge the edge. Publishing is PROFILE-WIDE: the whole profile is snapshotted into one KV blob, so the optional `chunk` in the body is an audit label only (it does not scope what ships).

      **Use case:** Ship the latest translations live after pushing/updating keys.
    tags:
      - Profiles
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
      - name: profileId
        in: path
        required: true
        description: The profile id to publish.
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/i18n.yaml#/PublishI18nProfileRequest
          example:
            chunk: default
    responses:
      "200":
        description: Publish a profile chunk
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/PublishI18nProfileResponse
            example:
              ok: true
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - VALIDATION
    x-cli:
      name: publish
      positional:
        - profileId
/api/admin/i18n/set:
  post:
    operationId: setI18nLabel
    summary: Set a key's value and publish it live
    description: |-
      Upsert a single key's value into a profile and immediately publish the whole profile (KV rebuild + CDN purge) so the new value is live in one call. The key is inserted when new and overwritten when it already exists. `profile` is a profile name — omit it to target the project's default-marked profile, or pass a name to target another locale.

      **Use case:** Correct or replace one live string and ship it without a separate `push` + `publish`.
    tags:
      - Keys
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/i18n.yaml#/SetI18nLabelRequest
          example:
            key: home.cta
            value: Get started
    responses:
      "200":
        description: Set a key's value and publish it live
        content:
          application/json:
            schema:
              $ref: ../components/schemas/i18n.yaml#/SetI18nLabelResponse
            example:
              ok: true
              profile: en:prod
              key: home.cta
              value: Get started
              version: "7"
              key_count: 42
              changed: true
              purged: purged
              kv_verified: true
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - VALIDATION
    x-cli:
      name: set
      positional:
        - key
        - value
