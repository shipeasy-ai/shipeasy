/api/admin/notifications:
  post:
    operationId: notifyOps
    summary: Raise an attention notification
    description: |-
      Raise a 'needs your attention' bell notification. Create-only and idempotent on `dedupeKey` — re-raising with the same key updates the one card instead of stacking duplicates. It never reads, marks read, or deletes the feed, so it is safe for restricted ops keys.

      **Use case:** Escalate work that can't land in code (a product decision, a credential only a human has, a resource only a human may edit), deduped so repeats don't spam the bell.
    tags:
      - Ops
    parameters:
      - $ref: ../components/parameters.yaml#/ProjectId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ops.yaml#/NotifyOpsRequest
          example:
            title: "Alert rule @alert:checkout-error-rate needs a human edit for #42"
            summary: "#42 is a false positive — the rule fires on the expected nightly batch spike, and rule definitions can only be edited by a human."
            steps:
              - "Open @alert:checkout-error-rate in the dashboard alerts page."
              - "Raise the threshold from `2%` to `5%` and widen the window to `1h`."
              - "Re-run the shipeasy-ops-work loop — #42 will be acknowledged."
            dedupeKey: feedback:42
            href: /dashboard/prj_0abc/bugs/42
    responses:
      "201":
        description: Raise an attention notification
        content:
          application/json:
            schema:
              $ref: ../components/schemas/ops.yaml#/NotifyOpsResponse
            example:
              dedupeKey: error:checkout:5xx
              dispatched: true
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/Unauthorized
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/UnprocessableEntity
    x-error-codes:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - VALIDATION
    x-cli:
      name: notify
